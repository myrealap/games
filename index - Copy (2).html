<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Myrealap · Dress-up Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      font-family: 'ChaletRegular', Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100%;
    }
    @font-face {
      font-family: 'ALGER';
      src: url('fonts/ALGER.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* ----- WHITE FADE ----- */
    .white-fade {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f7f0ea; z-index: 100001;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .white-fade.active { opacity: 1; }

    /* ----- LOADING SCREEN ----- */
    .loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #eddeef; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1s ease; flex-direction: column;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-bg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100%; height: 100%;
      background-image: url('images/loading-bg.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      opacity: 0; pointer-events: none; z-index: 0; transition: opacity 0.8s ease;
    }
    .loading-bg.show { opacity: 0.3; }
    .quote-container {
      position: relative; text-align: center; padding: 40px; max-width: 80%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .quote-bg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 920px; height: 220px;
      background-image: url('images/quote-bg.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      opacity: 0.25; pointer-events: none; z-index: 0;
    }
    .quote-text {
      position: relative; color: #000000; font-size: 20px; letter-spacing: 2px;
      font-family: 'ChaletRegular', Arial, sans-serif; line-height: 1.6;
      font-style: italic; z-index: 1; text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .quote-author {
      position: relative; color: #6d6865; font-size: 12px;
      margin-top: 20px; letter-spacing: 1px; z-index: 1;
    }
    .loading-action-area {
      position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%);
      z-index: 10000; display: flex; align-items: center; justify-content: center;
    }
    .loading-percentage {
      color: #000000; font-size: 28px; font-family: 'ALGER', serif;
      letter-spacing: 3px; animation: loadingPulse 1.5s ease-in-out infinite;
      transition: opacity 0.6s ease; position: absolute;
      text-shadow: 0 0 12px rgba(255,215,200,0.3);
    }
    .loading-percentage.fade-out { opacity: 0; pointer-events: none; }
    @keyframes loadingPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

    .go-button {
      width: 110.5px; height: 66px;
      background-image: url('images/Go.png');
      background-repeat: no-repeat; background-position: 0 0;
      background-size: 221px 66px;
      cursor: pointer; border: none; background-color: transparent;
      opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
      position: absolute;
    }
    .go-button.show { opacity: 1; pointer-events: auto; animation: goPulse 1.5s ease-in-out infinite; }
    .go-button:hover { background-position: -110.5px 0; }
    .go-button:focus { outline: none; }
    .go-button.clicked { animation: goFadeOut 0.5s ease forwards; pointer-events: none; }
    @keyframes goPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes goFadeOut { to { opacity: 0; transform: scale(0.5); } }

    /* ----- SPARKLE CONTAINERS ----- */
    .global-sparkle-container, .mouse-trail-container, .touch-sparkle-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 100000; overflow: hidden;
    }
    .mouse-trail-container { z-index: 99999997; }
    .touch-sparkle-container { z-index: 99999998; }
    .global-sparkle, .mouse-sparkle, .touch-sparkle {
      position: absolute;
      background-size: contain; background-repeat: no-repeat; background-position: center;
      opacity: 0; pointer-events: none;
    }
    .global-sparkle { animation: globalSparkleFade 1.2s ease-out forwards; }
    .mouse-sparkle { animation: mouseSparkleFade 0.8s ease-out forwards; }
    .touch-sparkle { animation: touchSparkleFade 0.6s ease-out forwards; }

    @keyframes globalSparkleFade {
      0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
      20% { opacity: 1; transform: scale(1.2) rotate(180deg); }
      80% { opacity: 0.6; transform: scale(0.8) rotate(360deg); }
      100% { opacity: 0; transform: scale(0.1) rotate(540deg); }
    }
    @keyframes mouseSparkleFade {
      0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
      30% { opacity: 1; transform: scale(1) rotate(180deg); }
      70% { opacity: 0.6; transform: scale(0.7) rotate(360deg); }
      100% { opacity: 0; transform: scale(0.1) rotate(540deg); }
    }
    @keyframes touchSparkleFade {
      0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
      30% { opacity: 1; transform: scale(1) rotate(180deg); }
      70% { opacity: 0.6; transform: scale(0.7) rotate(360deg); }
      100% { opacity: 0; transform: scale(0.1) rotate(540deg); }
    }

    /* ----- FALLING SPARKLES ----- */
    .falling-sparkle-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 99999996; overflow: hidden;
    }
    .falling-sparkle {
      position: absolute;
      background-size: contain; background-repeat: no-repeat; background-position: center;
      opacity: 0;
      animation: fallSparkle 1.2s ease-out forwards;
      pointer-events: none;
    }
    @keyframes fallSparkle {
      0% { opacity: 0; transform: translateY(0) scale(0.3) rotate(0deg); }
      20% { opacity: 1; transform: translateY(10px) scale(1) rotate(60deg); }
      60% { opacity: 0.8; transform: translateY(35px) scale(0.9) rotate(180deg); }
      100% { opacity: 0; transform: translateY(60px) scale(0.4) rotate(300deg); }
    }

    /* ----- CUSTOM CURSOR ----- */
    .custom-cursor {
      position: fixed; width: 40px; height: 40px;
      pointer-events: none; z-index: 99999999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s ease;
    }
    .custom-cursor::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('images/sparkle.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      animation: cursorSpin 1.5s linear infinite, cursorGlow 1.5s ease-in-out infinite;
    }
    @keyframes cursorSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes cursorGlow {
      0% { opacity: 0.7; filter: drop-shadow(0 0 2px rgba(255,240,230,0.3)); }
      50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(255,215,200,0.9)) drop-shadow(0 0 4px #d4a0a0); }
      100% { opacity: 0.7; filter: drop-shadow(0 0 2px rgba(255,240,230,0.3)); }
    }

    /* ============================================================
       LANDING & HELP SCREENS
       ============================================================ */
    .landing-page {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9998;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
      background: transparent;
    }
    .help-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 1s ease;
      background: transparent;
    }
    .landing-page.show { opacity: 1; pointer-events: auto; }
    .help-screen.show { opacity: 1; pointer-events: auto; }

    .bg-design {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('images/bg_design_studio.jpg');
      background-size: cover; background-position: center; background-repeat: no-repeat;
      z-index: 0;
    }
    .bg-design-help {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('images/bg_design_studio_help.jpg');
      background-size: cover; background-position: center; background-repeat: no-repeat;
      z-index: 0;
    }
    .landing-sparkle-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('images/landing-sparkle.png');
      background-size: cover; background-position: center; background-repeat: no-repeat;
      z-index: 1; opacity: 0; transition: opacity 1.5s ease; pointer-events: none;
    }
    .landing-sparkle-overlay.show { opacity: 1; }

    .landing-main-image, .help-main-image {
      max-width: 100%; max-height: 90%; object-fit: contain;
      pointer-events: none; position: relative; z-index: 2;
    }

    .play-button, .help-play-button {
      position: absolute;
      width: 250px; height: 125px;
      background-repeat: no-repeat; background-position: 0 0;
      background-size: 500px 125px;
      cursor: pointer; border: none; background-color: transparent;
      z-index: 3; transition: transform 0.3s ease;
    }
    .play-button {
      background-image: url('images/play_landing.png');
      top: 50%; left: 50%; transform: translateX(-50%);
    }
    .play-button:hover { background-position: -250px 0; transform: translateX(-50%) scale(1.05); }
    .help-play-button {
      background-image: url('images/play_help.png');
      top: 50%; left: 50%; transform: translateX(-50%);
    }
    .help-play-button:hover { background-position: -250px 0; transform: translateX(-50%) scale(1.05); }

    /* Help screen extra images */
    .help-extra-images {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .help-extra-images.show { opacity: 1; }
    .help-extra-images img {
      position: absolute;
      object-fit: contain;
    }
    .help-extra-images .horse { bottom: 10%; left: 5%; height: 40%; }
    .help-extra-images .cock { bottom: 10%; right: 5%; height: 40%; }
    .help-extra-images .model { top: 15%; left: 50%; transform: translateX(-50%); height: 60%; }

    .carousel-container {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 2; width: 100%; height: 497px; overflow: hidden; pointer-events: none;
    }
    .carousel-container.left { left: 30%; transform: scale(1.3); top: 30%; }
    .carousel-container.right { right: 30%; transform: scale(1.3); top: 30%; }
    .carousel-stack { position: relative; width: 100%; height: 100%; }
    .carousel-image {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: contain; opacity: 0; transition: opacity 1.2s ease; pointer-events: none;
    }
    .carousel-image.show { opacity: 1; }

    /* ============================================================
       GAME SCREEN
       ============================================================ */
    .game-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9997;
      display: none;
      background: #ffffff;
    }
    .game-screen.show { display: block; }

    .game-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('images/bg/1.jpg');
      background-size: cover; background-position: center; background-repeat: no-repeat;
      z-index: 0;
      transition: opacity 0.8s ease;
    }
    .game-bg.fade-out { opacity: 0; }

    /* SELECT SCREEN OVERLAY */
    .select-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9998;
      background: rgb(255 255 255 / 64%);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .select-screen.show { opacity: 1; pointer-events: auto; }
    .select-screen.fade-out { opacity: 0; pointer-events: none; }

    .select-box {
      background: rgba(255,255,255,0.1);
      padding: 10% 12%;
      text-align: center;
      background-image: url(images/quote-bg.png);
      z-index: 9999;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .select-box h2 {
      color: #fff;
      font-family: 'ALGER', serif;
      font-size: 32px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    .select-options {
      display: flex; gap: 30px; justify-content: center;
    }
    .select-option {
      cursor: pointer;
      transition: transform 0.3s ease;
      text-align: center;
    }
    .select-option:hover { transform: scale(1.1); }
    .select-option img {
      width: 120px; height: 120px;
      object-fit: contain;
    }
    .select-option p {
      color: #fff;
      margin-top: 10px;
      font-family: 'ALGER', serif;
      font-size: 16px;
      letter-spacing: 1px;
    }

    /* Model display */
    .model-display {
      position: absolute;
      bottom: 5%; left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      height: 85%;
      pointer-events: none;
    }
    .model-display img {
      height: 90%;
      object-fit: contain;
      margin-top: 15%;
    }

    /* Help Button (in-game) */
    .help-btn-game {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      width: 150px; height: 150px;
      background-image: url('images/help_btn.png');
      background-repeat: no-repeat; background-position: 0 0;
      background-size: 300px 150px;
      cursor: pointer; border: none; background-color: transparent;
      z-index: 15; transition: transform 0.3s ease, opacity 0.5s ease;
      opacity: 1;
    }
    .help-btn-game:hover { background-position: -150px 0; transform: translateX(-50%) scale(1.05); }
    .help-btn-game:focus { outline: none; }

    /* In-game help overlay */
    .game-help-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgb(255 255 255 / 64%);
      z-index: 99995;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    .game-help-overlay.show { opacity: 1; pointer-events: auto; }
    .game-help-image { max-width: 80%; max-height: 80%; object-fit: contain; position: relative; z-index: 1; }
    .game-help-close-btn {
      position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
      width: 250px; height: 125px;
      background-image: url('images/play_help.png');
      background-repeat: no-repeat; background-position: 0 0;
      background-size: 500px 125px;
      cursor: pointer; border: none; background-color: transparent;
      z-index: 2; transition: transform 0.3s ease;
    }
    .game-help-close-btn:hover { background-position: -250px 0; transform: translateX(-50%) scale(1.05); }

    /* Music Box */
    .music-box {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 10;
      width: 200px; height: 60px;
      background-image: url('images/music.png');
      background-size: contain; background-repeat: no-repeat;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 15px;
      pointer-events: auto;
    }
    .music-btn {
      width: 30px; height: 30px;
      cursor: pointer; border: none; background-color: transparent;
      background-size: contain; background-repeat: no-repeat; background-position: center;
      transition: transform 0.2s ease;
    }
    .music-btn:hover { transform: scale(1.1); }
    .music-btn.prev { background-image: url('images/prev.png'); }
    .music-btn.next { background-image: url('images/next.png'); }
    .music-btn.melody { 
      background-image: url('images/melody.png');
      width: 50px; height: 30px;
      pointer-events: none;
    }

    /* BG Selector */
    .bg-selector {
      position: absolute;
      bottom: 30%; left: 20px;
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .bg-thumb {
      width: 80px; height: 60px;
      object-fit: cover;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.7;
    }
    .bg-thumb:hover { opacity: 1; transform: scale(1.05); }
    .bg-thumb.active { opacity: 1; }

    /* Menu Panel */
    .menu-panel {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      align-items: stretch;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .menu-panel.show { opacity: 1; pointer-events: auto; }

    .menu-bg {
      background-image: url('images/menu.png');
      background-size: contain; background-repeat: no-repeat;
      background-position: center;
      width: 120px;
      padding: 20px 15px;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      min-height: 400px;
    }
    .menu-btn {
      width: 80px; height: 60px;
      background-repeat: no-repeat; background-position: 0 0;
      background-size: 160px 60px;
      cursor: pointer; border: none; background-color: transparent;
      transition: transform 0.3s ease;
    }
    .menu-btn:hover { background-position: -80px 0; transform: scale(1.05); }
    .menu-btn.tails { background-image: url('images/btn_tails.png'); }
    .menu-btn.shirts { background-image: url('images/btn_shirts.png'); }
    .menu-btn.accessories { background-image: url('images/btn_accessories.png'); }

    /* Items Panel */
    .items-panel {
      position: absolute;
      right: -200px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9;
      width: 180px;
      height: 742px;
      background-image: url('images/itemsbg.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: right 0.5s ease;
      pointer-events: none;
      min-height: 400px;
      justify-content: center;
    }
    .items-panel.open { right: 120px; pointer-events: auto; }

    .items-scroll {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      max-height: 100%;
      overflow: hidden;
      width: 100%;
      padding: 5px 0;
    }
    .item-thumb {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.7;
    }
    .item-thumb:hover { opacity: 1; transform: scale(1.05); }
    .item-thumb.active { opacity: 1; }

    .scroll-btn {
      width: 30px; height: 30px;
      background-repeat: no-repeat; background-position: center;
      background-size: contain;
      cursor: pointer; border: none; background-color: transparent;
      transition: opacity 0.3s ease;
    }
    .scroll-btn.up { background-image: url('images/up.png'); }
    .scroll-btn.down { background-image: url('images/down.png'); }
    .scroll-btn.disabled { opacity: 0.25; pointer-events: none; }

    /* Bottom-right buttons */
    .bottom-btns {
      position: absolute;
      bottom: 80px; right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .print-btn, .startover-btn {
      width: 120px; height: 45px;
      background-repeat: no-repeat; background-position: 0 0;
      background-size: 240px 45px;
      cursor: pointer; border: none; background-color: transparent;
      transition: transform 0.3s ease;
    }
    .print-btn { background-image: url('images/print.png'); }
    .startover-btn { background-image: url('images/startover.png'); }
    .print-btn:hover, .startover-btn:hover { background-position: -120px 0; transform: scale(1.05); }

    .footer {
      position: fixed; bottom: 5px; left: 50%; transform: translateX(-50%);
      color: #000000; font-size: 10px; z-index: 1000002;
      font-family: 'ChaletRegular', Arial, sans-serif;
      letter-spacing: 1px; pointer-events: none; opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .carousel-container { width: 100%; height: 166px; }
      .carousel-container.left, .carousel-container.right { transform: scale(1.8) !important; top: 30% !important; }
      .carousel-container.left { left: 25% !important; }
      .carousel-container.right { right: 25% !important; }
      .play-button, .help-play-button { width: 75px; height: 37.5px; background-size: 150px 37.5px; transform: scale(2); }
      .landing-page, .help-screen { transform: scale(1.5); }
      .menu-panel { transform: scale(0.7); right: -20px; }
      .items-panel { transform: scale(0.7); }
      .items-panel.open { right: 60px; }
      .music-box { transform: scale(0.8); bottom: 10px; left: 10px; }
      .bg-selector { transform: scale(0.8); bottom: 10px; right: 10px; }
      .bottom-btns { bottom: 60px; right: 10px; transform: scale(0.8); }
      .help-btn-game { transform: translateX(-50%) scale(0.7); top: 5px; }
      .help-extra-images .horse { height: 25%; }
      .help-extra-images .cock { height: 25%; }
      .help-extra-images .model { height: 40%; }
      .select-box { padding: 20px 30px; }
      .select-options { gap: 15px; }
      .select-option img { width: 80px; height: 80px; }
      .footer { font-size: 8px; bottom: 3px; }
    }
    @media (max-width: 480px) {
      .carousel-container { width: 100%; height: 120px; }
      .carousel-container.left, .carousel-container.right { transform: scale(1.5) !important; top: 30% !important; }
      .carousel-container.left { left: 20% !important; }
      .carousel-container.right { right: 20% !important; }
      .play-button, .help-play-button { width: 60px; height: 30px; background-size: 120px 30px; transform: scale(1.8); }
      .landing-page, .help-screen { transform: scale(1.2); }
      .menu-panel { transform: scale(0.5); right: -40px; }
      .items-panel { transform: scale(0.5); }
      .items-panel.open { right: 30px; }
      .music-box { transform: scale(0.6); bottom: 5px; left: 5px; }
      .bg-selector { transform: scale(0.6); bottom: 5px; right: 5px; }
      .bottom-btns { bottom: 40px; right: 5px; transform: scale(0.6); }
      .help-btn-game { transform: translateX(-50%) scale(0.5); top: 0px; }
      .help-extra-images .horse { height: 20%; bottom: 5%; }
      .help-extra-images .cock { height: 20%; bottom: 5%; }
      .help-extra-images .model { height: 30%; top: 20%; }
      .select-box { padding: 15px 20px; }
      .select-options { gap: 10px; flex-direction: column; }
      .select-option img { width: 60px; height: 60px; }
      .model-display { height: 70%; bottom: 10%; }

  <script>
    // ========== QUOTES ==========
    const quotes = [
      { text: "Love & Imagination can change the world!", author: "Myrealap" },
      { text: "What makes you different, Makes you special", author: "Myrealap" },

    function showRandomQuote() {
      const r = Math.floor(Math.random() * quotes.length);
      document.getElementById('quoteText').textContent = `" ${quotes[r].text} "`;
      document.getElementById('quoteAuthor').textContent = `— ${quotes[r].author}`;
    }
    showRandomQuote();

    // ========== DEVICE ==========
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // ========== SPARKLE IMAGES ==========
    const sparkleImages = ['images/sparkle_a.png', 'images/sparkle_b.png'];
    function getRandomSparkleImage() { return sparkleImages[Math.floor(Math.random() * sparkleImages.length)]; }

    // ========== MOUSE TRAIL ==========
    const MOUSE_SPARKLE_INTERVAL = 15;
    const MOUSE_SPARKLE_SIZE_MIN = 8;
    const MOUSE_SPARKLE_SIZE_MAX = 25;
    let lastMouseX = window.innerWidth/2, lastMouseY = window.innerHeight/2;
    let continuousSparkleInterval = null;
    let fallingInterval = null;

    function addMouseSparkle(x, y) {
      const container = document.getElementById('mouseTrailContainer');
      const el = document.createElement('div');
      el.className = 'mouse-sparkle';
      el.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
      const ox = (Math.random() - 0.5) * 20;
      const oy = (Math.random() - 0.5) * 20;
      el.style.left = (x + ox) + 'px';
      el.style.top = (y + oy) + 'px';
      el.style.animationDelay = Math.random() * 0.1 + 's';
      const size = Math.random() * (MOUSE_SPARKLE_SIZE_MAX - MOUSE_SPARKLE_SIZE_MIN) + MOUSE_SPARKLE_SIZE_MIN;
      el.style.width = size + 'px'; el.style.height = size + 'px';
      container.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }

    function startMouseTrail() {
      if (isTouchDevice) return;
      let lastTime = 0;
      document.addEventListener('mousemove', (e) => {
        const now = Date.now();
        if (now - lastTime > MOUSE_SPARKLE_INTERVAL) { lastTime = now; addMouseSparkle(e.clientX, e.clientY); }
        lastMouseX = e.clientX; lastMouseY = e.clientY;
      });
      continuousSparkleInterval = setInterval(() => addMouseSparkle(lastMouseX, lastMouseY), MOUSE_SPARKLE_INTERVAL);
    }

    // ========== FALLING SPARKLES ==========
    function addFallingSparkle(x, y) {
      const container = document.getElementById('fallingSparkleContainer');
      const el = document.createElement('div');
      el.className = 'falling-sparkle';
      el.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
      el.style.left = (x + (Math.random() - 0.5) * 30) + 'px';
      el.style.top = (y + (Math.random() - 0.5) * 10) + 'px';
      el.style.animationDelay = Math.random() * 0.2 + 's';
      const size = Math.random() * 18 + 10;
      el.style.width = size + 'px'; el.style.height = size + 'px';
      container.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    }

    function startFallingSparkles() {
      if (isTouchDevice) return;
      let fallInterval;
      document.addEventListener('mousemove', (e) => {
        if (fallInterval) clearInterval(fallInterval);
        let count = 0;
        fallInterval = setInterval(() => {
          if (count > 12) { clearInterval(fallInterval); return; }
          addFallingSparkle(e.clientX, e.clientY);
          count++;
        }, 80);
        if (fallingInterval) clearInterval(fallingInterval);
        fallingInterval = setInterval(() => {
          addFallingSparkle(e.clientX, e.clientY);
        }, 200);
      });
      document.addEventListener('mouseleave', () => {
        if (fallingInterval) clearInterval(fallingInterval);
      });
    }

    // ========== TOUCH SPARKLES ==========
    function addTouchSparkle(x, y) {
      const container = document.getElementById('touchSparkleContainer');
      const el = document.createElement('div');
      el.className = 'touch-sparkle';
      el.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
      el.style.left = (x + (Math.random() - 0.5) * 30) + 'px';
      el.style.top = (y + (Math.random() - 0.5) * 30) + 'px';
      const size = Math.random() * 25 + 15;
      el.style.width = size + 'px'; el.style.height = size + 'px';
      container.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }
    function startTouchSparkles() {
      if (!isTouchDevice) return;
      document.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        addTouchSparkle(t.clientX, t.clientY);
      });
      document.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        for (let i=0; i<3; i++) setTimeout(() => addTouchSparkle(t.clientX, t.clientY), i*50);
      });
    }

    // ========== CUSTOM CURSOR ==========
    let customCursor = null;
    function setupCustomCursor() {
      if (isTouchDevice) return;
      customCursor = document.createElement('div');
      customCursor.className = 'custom-cursor';
      document.body.appendChild(customCursor);
      let mx=0, my=0, cx=0, cy=0;
      document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
      function animate() {
        cx += (mx - cx) * 0.3; cy += (my - cy) * 0.3;
        if (customCursor) { customCursor.style.left = cx + 'px'; customCursor.style.top = cy + 'px'; }
        requestAnimationFrame(animate);
      }
      animate();
      document.addEventListener('mouseleave', () => { if (customCursor) customCursor.style.opacity = '0'; });
      document.addEventListener('mouseenter', () => { if (customCursor) customCursor.style.opacity = '1'; });
    }

    // ========== AUDIO ==========
    let audioContext = null;
    let landingMusic = null;
    let landingMusicBuffer = null;
    const clickSound = new Audio("sounds/click.mp3"); clickSound.volume = 0.5;
    const hoverSound = new Audio("sounds/hover.mp3"); hoverSound.volume = 0.3;
    const appearSounds = {
      //landing: new Audio("sounds/appear.mp3"),
      help: new Audio("sounds/appear1.mp3"),
      game: new Audio("sounds/appear2.mp3"),
      bonus: new Audio("sounds/appear3.mp3"),
      endHigh: new Audio("sounds/appear4.mp3"),
      endLow: new Audio("sounds/appear5.mp3")
    };
    appearSounds.help.volume = 0.9;

    function playClickSound() { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); }
    function playHoverSound() { hoverSound.currentTime = 0; hoverSound.play().catch(()=>{}); }
    function playAppearSound(type) { const s = appearSounds[type]; if (s) { s.currentTime = 0; s.play().catch(()=>{}); } }

    function initAudioContext() {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') audioContext.resume();
    }

    function loadLandingMusic() {
      fetch('music/music_game.mp3')
        .then(r => r.arrayBuffer())
        .then(buf => { landingMusicBuffer = buf; })
        .catch(() => {});
    }

    function playLandingMusic() {
      if (!audioContext || !landingMusicBuffer) return;
      if (landingMusic) { try { landingMusic.stop(); } catch(e) {} }
      audioContext.decodeAudioData(landingMusicBuffer.slice(0))
        .then(buffer => {
          landingMusic = audioContext.createBufferSource();
          landingMusic.buffer = buffer;
          landingMusic.loop = true;
          const gain = audioContext.createGain();
          gain.gain.value = 0.9;
          landingMusic.connect(gain);
          gain.connect(audioContext.destination);
          landingMusic.start(0);
        }).catch(() => {});
    }

    function stopLandingMusic() {
      if (landingMusic) { try { landingMusic.stop(); landingMusic = null; } catch(e) {} }
    }

    loadLandingMusic();

    function addHoverSoundToButtons() {
      document.querySelectorAll('button, .select-option, .bg-thumb, .item-thumb').forEach(el => 
        el.addEventListener('mouseenter', () => playHoverSound())
      );
    }

    // ========== CAROUSEL SYSTEM ==========
    class ImageCarousel {
      constructor(containerId, startIndex) {
        this.container = document.getElementById(containerId);
        this.stack = this.container.querySelector('.carousel-stack');
        this.currentIndex = startIndex || 0;
        this.images = [];
        this.totalImages = 9;
        this.interval = null;
        this.isRunning = false;
        this.init();
      }

      init() {
        for (let i = 1; i <= this.totalImages; i++) {
          const img = document.createElement('img');
          img.className = 'carousel-image';
          img.src = `images/landing/${i}.png`;
          img.alt = `Model ${i}`;
          this.stack.appendChild(img);
          this.images.push(img);
        }
        this.showImage(this.currentIndex);
        this.start();
      }

      showImage(index) {
        this.images.forEach(img => img.classList.remove('show'));
        if (this.images[index]) {
          this.images[index].classList.add('show');
        }
      }

      getNextIndex() {
        return (this.currentIndex + 1) % this.totalImages;
      }

      next() {
        const nextIdx = this.getNextIndex();
        this.showImage(nextIdx);
        this.currentIndex = nextIdx;
      }

      start() {
        if (this.isRunning) return;
        this.isRunning = true;
        this.interval = setInterval(() => this.next(), 2500);
      }

      stop() {
        this.isRunning = false;
        if (this.interval) {
          clearInterval(this.interval);
          this.interval = null;
        }
      }
    }

    // ========== SCREEN TRANSITIONS ==========
    let landingCarousel, helpCarousel;

        landingCarousel = new ImageCarousel('carouselLeft', 0);
        const rightCarousel = new ImageCarousel('carouselRight', 4);
        window._rightCarousel = rightCarousel;

    function hideLandingPage() {
      document.getElementById('landingPage').classList.remove('show');

        landingCarousel.stop();

        const rightHelp = new ImageCarousel('carouselRight', 4);

      document.getElementById('helpSparkleOverlay').classList.remove('show');
      document.getElementById('helpExtraImages').classList.remove('show');

        helpCarousel.stop();
        window._rightHelp?.stop();

      setTimeout(() => showSelectScreen(), 300);
    }

      const gameScreen = document.getElementById('gameScreen');
      
      // Show game screen first

    function updateItems(menuType) {
      currentMenu = menuType;
      currentItems = itemData[menuType] || [];
      itemScrollIndex = 0;
      renderItems();
    }

    function renderItems() {
      const container = document.getElementById('itemsScroll');
      container.innerHTML = '';
      
      const start = itemScrollIndex;
      const end = Math.min(start + visibleItems, currentItems.length);
      
      for (let i = start; i < end; i++) {
        const item = currentItems[i];
        const thumb = document.createElement('img');
        thumb.className = 'item-thumb';
        thumb.src = item.thumb;
        thumb.alt = 'Item';
        thumb.dataset.index = i;
        thumb.addEventListener('click', () => selectItem(i));
        container.appendChild(thumb);
      }
      
      // Update scroll buttons
      document.getElementById('scrollUp').classList.toggle('disabled', itemScrollIndex <= 0);
      document.getElementById('scrollDown').classList.toggle('disabled', itemScrollIndex + visibleItems >= currentItems.length);
    }

    function selectItem(index) {
      const item = currentItems[index];
      if (!item) return;
      playClickSound();
      
      // Update model image (in real implementation, would layer items)
      document.getElementById('modelImage').src = item.full;
      
      // Update active state
      document.querySelectorAll('.item-thumb').forEach(el => el.classList.remove('active'));
      const thumbs = document.querySelectorAll('.item-thumb');
      if (thumbs[index - itemScrollIndex]) {
        thumbs[index - itemScrollIndex].classList.add('active');
      }
    }

    function scrollItems(direction) {
      if (direction === 'up' && itemScrollIndex > 0) {
        itemScrollIndex--;
        renderItems();
        playClickSound();
      } else if (direction === 'down' && itemScrollIndex + visibleItems < currentItems.length) {
        itemScrollIndex++;
        renderItems();
        playClickSound();
      }
    }

    // ========== BG SELECTOR ==========
    function changeBg(bgNumber) {
      currentBg = bgNumber;
      const bg = document.getElementById('gameBg');
      bg.style.opacity = '0';
      setTimeout(() => {
        bg.style.backgroundImage = `url('images/bg/${bgNumber}.jpg')`;
        bg.style.opacity = '1';
      }, 400);
      
      // Update thumbnails
      document.querySelectorAll('.bg-thumb').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.bg) === bgNumber);
        // Update thumbnail images to show next bg
        const nextBg = bgNumber % 3 + 1;
        el.src = `images/bg/thumb${nextBg}.png`;
        el.dataset.bg = nextBg;
      });
      
      playClickSound();
    }

    // ========== MUSIC PLAYER ==========
    let currentTrack = 0;
    const playlist = [
      { name: "Dream Melody", file: "music/track1.mp3" },
      { name: "Ocean Whisper", file: "music/track2.mp3" },
      { name: "Fairy Dance", file: "music/track3.mp3" }
    ];
    let audioPlayer = new Audio();

    function playTrack(index) {
      currentTrack = index;
      audioPlayer.src = playlist[index].file;
      audioPlayer.play().catch(() => {});
    }

    function nextTrack() {
      currentTrack = (currentTrack + 1) % playlist.length;
      playTrack(currentTrack);
      playClickSound();
    }

    function prevTrack() {
      currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
      playTrack(currentTrack);
      playClickSound();
    }

    // ========== EVENT LISTENERS ==========
    // Go button
    document.getElementById('goButton').addEventListener('click', function(e) {
      e.preventDefault();
      initAudioContext();
      playClickSound();
      this.classList.add('clicked');
      triggerGlobalSparkleBurst(() => {
        whiteFadeTransition(() => {
          setTimeout(() => playLandingMusic(), 200);
          document.getElementById('loadingScreen').classList.add('hide');
          document.getElementById('loadingActionArea').style.display = 'none';
          setTimeout(() => showLandingPage(), 400);
        });
      });
    });

    // Play buttons
    document.getElementById('playButton').addEventListener('click', function(e) {
      e.preventDefault();
      initAudioContext();
      playClickSound();
      triggerGlobalSparkleBurst(() => {
        hideLandingPage();
      });
    });

    document.getElementById('helpPlayButton').addEventListener('click', function(e) {
      e.preventDefault();
      initAudioContext();
      playClickSound();
      triggerGlobalSparkleBurst(() => {
        hideHelpScreen();
      });
    });

    // Select options
    document.querySelectorAll('.select-option').forEach(option => {
      option.addEventListener('click', function() {
        const type = this.dataset.type;
        selectedCharacter = type;
        playClickSound();
        
        // Set default model based on type
        if (type === 'mermaid') {
          document.getElementById('modelImage').src = 'images/assets/full/mermaid/mermaid_purple_fish2.png';
        } else if (type === 'fairy') {
          document.getElementById('modelImage').src = 'images/fairy_default.png';
        } else if (type === 'human') {
          document.getElementById('modelImage').src = 'images/human_default.png';
        }
        
        hideSelectScreen();
      });
    });

    // In-game help
    document.getElementById('helpBtnGame').addEventListener('click', function() {
      playClickSound();
      document.getElementById('gameHelpOverlay').classList.add('show');
    });
    document.getElementById('gameHelpCloseBtn').addEventListener('click', function() {
      playClickSound();
      document.getElementById('gameHelpOverlay').classList.remove('show');
    });

    // Music
    document.getElementById('musicPrev').addEventListener('click', prevTrack);
    document.getElementById('musicNext').addEventListener('click', nextTrack);

    // BG Selector
    document.querySelectorAll('.bg-thumb').forEach(thumb => {
      thumb.addEventListener('click', function() {
        changeBg(parseInt(this.dataset.bg));
      });
    });

    // Menu buttons
    document.querySelectorAll('.menu-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const menu = this.dataset.menu;
        playClickSound();
        updateItems(menu);
        document.getElementById('itemsPanel').classList.add('open');
      });
    });

    // Scroll buttons
    document.getElementById('scrollUp').addEventListener('click', () => scrollItems('up'));
    document.getElementById('scrollDown').addEventListener('click', () => scrollItems('down'));

    // Start Over
    document.getElementById('startoverBtn').addEventListener('click', function() {
      playClickSound();
      if (confirm('Start over? All progress will be lost.')) {
        location.reload();
      }
    });

    // Print
    document.getElementById('printBtn').addEventListener('click', function() {
      playClickSound();
      alert('Print function coming soon!');
    });

    // ========== WHITE FADE ==========
    function whiteFadeTransition(callback) {
      const fade = document.getElementById('whiteFade');
      fade.classList.add('active');
      setTimeout(() => {
        if (callback) callback();
        setTimeout(() => fade.classList.remove('active'), 300);
      }, 400);
    }

    // ========== GLOBAL SPARKLE BURST ==========
    function triggerGlobalSparkleBurst(callback) {
      const container = document.getElementById('globalSparkleContainer');
      const total = 40;
      let created = 0;
      function create() {
        const el = document.createElement('div');
        el.className = 'global-sparkle';
        el.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
        el.style.left = Math.random() * window.innerWidth + 'px';
        el.style.top = Math.random() * window.innerHeight + 'px';
        el.style.animationDelay = Math.random() * 0.3 + 's';
        const size = Math.random() * 40 + 20;
        el.style.width = size + 'px'; el.style.height = size + 'px';
        container.appendChild(el);
        created++;
        if (created >= total) {
          setTimeout(() => { container.innerHTML = ''; if (callback) callback(); }, 1500);
        }
      }
      for (let i=0; i<total; i++) setTimeout(create, i*25);
    }

    // ========== LOADING ==========
    const filesToLoad = [
  // Core assets (no duplicates)
  'images/quote-bg.png', 'images/sparkle.png', 'images/sparkle_a.png', 'images/sparkle_b.png',
  'images/Go.png', 'images/loading-bg.png', 'images/landing.png', 'images/play_landing.png',
  'images/play_help.png', 'images/help.png', 'images/bg_design_studio.jpg', 'images/landing-sparkle.png',
  'images/bg_design_studio_help.jpg', 'images/fashion_horse.png', 'images/cock.png', 'images/model_help.png',
  'images/help_btn.png', 'images/music.png', 'images/prev.png', 'images/next.png', 'images/melody.png',
  'images/menu.png', 'images/btn_tails.png', 'images/btn_shirts.png', 'images/btn_accessories.png',
  'images/itemsbg.png', 'images/up.png', 'images/down.png', 'images/print.png', 'images/startover.png',
  'images/fairy_icon.png', 'images/mermaid_icon.png', 'images/human_icon.png',
  'fonts/ALGER.ttf',
  'sounds/click.mp3', 'sounds/hover.mp3',
  'sounds/appear.mp3', 'sounds/appear1.mp3', 'sounds/appear2.mp3',
  'sounds/appear3.mp3', 'sounds/appear4.mp3', 'sounds/appear5.mp3',
  'music/music_game.mp3'
];

// Add landing images
for (let i = 1; i <= 9; i++) {
  filesToLoad.push(`images/landing/${i}.png`);
}

// Add bg images and thumbs
for (let i = 1; i <= 3; i++) {
  filesToLoad.push(`images/bg/${i}.jpg`);
  filesToLoad.push(`images/bg/thumb${i}.png`);
}

// Add ONLY the actual files you're using in itemData
// For tails
const tailFiles = [
  'mermaid_purple_pattern', 'mermaid_yellow_fish2', 'mermaid_blue', 'mermaid_green_pattern',
  'mermaid_red_design', 'mermaid_white_fish', 'mermaid_pink_fish2', 'mermaid_gray_fish',
  'mermaid_blue_pattern', 'mermaid_yellow_design', 'mermaid_green_fish', 'mermaid_purple_fish2',
  'mermaid_blue_fish2', 'mermaid_white_pattern', 'mermaid_red_fish2', 'mermaid_pink_pattern',
  'mermaid_yellow_pattern', 'mermaid_color_fish2', 'mermaid_green_fish2', 'mermaid_white_fish2',
  'mermaid_purple_fish', 'mermaid_blue_fish'
];

tailFiles.forEach(file => {
  filesToLoad.push(`images/assets/thumb/mermaid/${file}.png`);
  filesToLoad.push(`images/assets/full/mermaid/${file}.png`);
});

// Add shirts and accessories
for (let i = 1; i <= 4; i++) {
  filesToLoad.push(`images/assets/thumb/mermaid/shirt${i}.png`);
  filesToLoad.push(`images/assets/full/mermaid/shirt${i}.png`);
}
for (let i = 1; i <= 5; i++) {
  filesToLoad.push(`images/assets/thumb/mermaid/acc${i}.png`);
  filesToLoad.push(`images/assets/full/mermaid/acc${i}.png`);
}
    

    let loadedCount = 0;
    const totalFiles = filesToLoad.length;
    const percentEl = document.getElementById('loadingPercent');

    function updatePercent() {
    const p = Math.min(Math.floor((loadedCount / totalFiles) * 100), 100);
    const percentEl = document.getElementById('loadingPercent');
    if (percentEl) {
        percentEl.textContent = p + '%';
        console.log('Loading:', p + '%'); // Debug - check console
    }
}

    function loadFile(src) {
    return new Promise((resolve) => {
        const isImage = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(src);
        const isAudio = /\.(mp3|wav|ogg|m4a)$/i.test(src);
        const isFont = /\.(ttf|otf|woff|woff2)$/i.test(src);

        if (isImage) {
            const img = new Image();
            img.onload = () => { 
                loadedCount++; 
                updatePercent(); 
                resolve(); 
            };
            img.onerror = () => { 
                loadedCount++; 
                updatePercent(); 
                resolve(); 
            };
            img.src = src;
        } else if (isAudio || isFont) {
            fetch(src)
                .then(() => { 
                    loadedCount++; 
                    updatePercent(); 
                    resolve(); 
                })
                .catch(() => { 
                    loadedCount++; 
                    updatePercent(); 
                    resolve(); 
                });
        } else {
            fetch(src)
                .then(() => { 
                    loadedCount++; 
                    updatePercent(); 
                    resolve(); 
                })
                .catch(() => { 
                    loadedCount++; 
                    updatePercent(); 
                    resolve(); 
                });
        }
    });
}

async function preloadAll() {
    console.log('Starting preload...'); // Debug
    console.log('Total files:', totalFiles); // Debug
    
    // Reset counter
    loadedCount = 0;
    updatePercent();
    
    try {
        // Load all files in parallel
        await Promise.all(filesToLoad.map(f => loadFile(f)));
        console.log('All files loaded!'); // Debug
    } catch (error) {
        console.error('Error loading files:', error);
    }
    
    // Make sure we're at 100%
    loadedCount = totalFiles;
    updatePercent();
    
    addHoverSoundToButtons();
    setTimeout(() => replacePercentWithGo(), 300);
}

    function replacePercentWithGo() {
      const pEl = document.getElementById('loadingPercent');
      const goBtn = document.getElementById('goButton');
      const bg = document.getElementById('loadingBg');
      pEl.classList.add('fade-out');
      setTimeout(() => {
        pEl.style.display = 'none';
        bg.classList.add('show');
        goBtn.classList.add('show');
      }, 600);
    }

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', () => {
      preloadAll();
      if (!isTouchDevice) {
        startMouseTrail();
        startFallingSparkles();
        setupCustomCursor();
      } else {
        startTouchSparkles();
      }
      
      // Init items with default
      updateItems('tails');
      
      // Set initial BG
      document.getElementById('gameBg').style.backgroundImage = "url('images/bg/1.jpg')";
    });

    // Fallback
    setTimeout(() => {
      const goBtn = document.getElementById('goButton');
      if (!goBtn.classList.contains('show')) {
        loadedCount = totalFiles;
        updatePercent();
        replacePercentWithGo();
      }
    }, 8000);
  </script>
