<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Myrealap Wishing Star Catching Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'ChaletRegular', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        @font-face {
            font-family: 'ALGER';
            src: url('fonts/ALGER.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ==================== LOADING SCREEN ==================== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
            flex-direction: column;
        }

        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-image: url('images/loading-bg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.8s ease;
        }

        .loading-bg.show {
            opacity: 0.4;
        }

        .quote-container {
            position: relative;
            text-align: center;
            padding: 40px;
            max-width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .quote-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 920px;
            height: 220px;
            background-image: url('images/quote-bg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .quote-text {
            position: relative;
            color: white;
            font-size: 20px;
            letter-spacing: 2px;
            font-family: 'ChaletRegular', Arial, sans-serif;
            line-height: 1.6;
            font-style: italic;
            z-index: 1;
        }

        .quote-author {
            position: relative;
            color: #888;
            font-size: 12px;
            margin-top: 20px;
            letter-spacing: 1px;
            z-index: 1;
        }

        .loading-action-area {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-percentage {
            color: #ffffff;
            font-size: 28px;
            font-family: 'ALGER', serif;
            letter-spacing: 3px;
            animation: loadingPulse 1.5s ease-in-out infinite;
            transition: opacity 0.6s ease;
            position: absolute;
        }

        .loading-percentage.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .go-button {
            width: 110.5px;
            height: 66px;
            background-image: url('images/Go.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 221px 66px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            position: absolute;
        }

        .go-button.show {
            opacity: 1;
            pointer-events: auto;
            animation: goPulse 1.5s ease-in-out infinite;
        }

        .go-button:hover {
            background-position: -110.5px 0;
        }

        .go-button:focus {
            outline: none;
        }

        .go-button.clicked {
            animation: goFadeOut 0.5s ease forwards;
            pointer-events: none;
        }

        @keyframes goPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes goFadeOut {
            to { opacity: 0; transform: scale(0.5); }
        }

        /* ==================== GLOBAL SPARKLE BURST ==================== */
        .global-sparkle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100000;
            overflow: hidden;
        }

        .global-sparkle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: globalSparkleFade 1.2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes globalSparkleFade {
            0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
            20% { opacity: 1; transform: scale(1.2) rotate(180deg); }
            80% { opacity: 0.6; transform: scale(0.8) rotate(360deg); }
            100% { opacity: 0; transform: scale(0.1) rotate(540deg); }
        }

        /* ==================== LANDING PAGE ==================== */
        .landing-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #dbccd3;
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .landing-page.show {
            opacity: 1;
            pointer-events: auto;
        }

        .landing-sparkle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .landing-bg-sparkle {
            position: absolute;
            background-image: url('images/sparkle_b.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: landingBgSparkleFade 3.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes landingBgSparkleFade {
            0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
            20% { opacity: 0.5; transform: scale(1.2) rotate(90deg); }
            50% { opacity: 0.2; transform: scale(0.8) rotate(180deg); }
            80% { opacity: 0.5; transform: scale(1.1) rotate(270deg); }
            100% { opacity: 0; transform: scale(0.3) rotate(360deg); }
        }

        .landing-image {
            max-width: 100%;
            max-height: 90%;
            object-fit: contain;
            pointer-events: none;
            position: relative;
            z-index: 1;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 125px;
            background-image: url('images/play_landing.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 500px 125px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .play-button:hover {
            background-position: -250px 0;
            transform: translateX(-50%) scale(1.05);
        }

        .play-button:focus {
            outline: none;
        }

        /* ==================== HELP/GUIDE SCREEN ==================== */
        .help-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #8f2937;
            z-index: 9997;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .help-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .help-sparkle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .help-bg-sparkle {
            position: absolute;
            background-image: url('images/sparkle_b.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: helpBgSparkleFade 3.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes helpBgSparkleFade {
            0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
            20% { opacity: 0.5; transform: scale(1.2) rotate(90deg); }
            50% { opacity: 0.2; transform: scale(0.8) rotate(180deg); }
            80% { opacity: 0.5; transform: scale(1.1) rotate(270deg); }
            100% { opacity: 0; transform: scale(0.3) rotate(360deg); }
        }

        .help-image {
            max-width: 100%;
            max-height: 90%;
            object-fit: contain;
            pointer-events: none;
            position: relative;
            z-index: 1;
        }

        .help-play-button {
            position: absolute;
            top: 57%;
            left: 45%;
            transform: translateX(-50%);
            width: 170px;
            height: 85px;
            background-image: url('images/play_help.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 340px 85px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .help-play-button:hover {
            background-position: -170px 0;
            transform: translateX(-50%) scale(1.05);
        }

        .help-play-button:focus {
            outline: none;
        }

        /* ==================== IN-GAME HELP OVERLAY ==================== */
        .game-help-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99995;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-help-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-help-sparkle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .game-help-bg-sparkle {
            position: absolute;
            background-image: url('images/sparkle_b.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: helpBgSparkleFade 3.5s ease-in-out infinite;
            pointer-events: none;
        }

        .game-help-image {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            pointer-events: none;
            position: relative;
            z-index: 1;
        }

        .game-help-close-btn {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 170px;
            height: 85px;
            background-image: url('images/play_help.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 340px 85px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .game-help-close-btn:hover {
            background-position: -170px 0;
            transform: translateX(-50%) scale(1.05);
        }

        .game-help-close-btn:focus {
            outline: none;
        }

        .help-btn-game {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background-image: url('images/help_btn.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 300px 150px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            z-index: 15;
            transition: transform 0.3s ease;
        }

        .help-btn-game:hover {
            background-position: -150px 0;
            transform: translateX(-50%) scale(1.05);
        }

        .help-btn-game:focus {
            outline: none;
        }

        /* ==================== GAME SCREEN ==================== */
        .game-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9996;
            display: none;
        }

        .game-screen.show {
            display: block;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .game-sparkle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .game-bg-sparkle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: gameBgSparkleFade 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes gameBgSparkleFade {
            0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
            20% { opacity: 0.6; transform: scale(1) rotate(90deg); }
            50% { opacity: 0.3; transform: scale(0.7) rotate(180deg); }
            80% { opacity: 0.6; transform: scale(1) rotate(270deg); }
            100% { opacity: 0; transform: scale(0.3) rotate(360deg); }
        }

        .score-display {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffffff;
            font-family: 'ALGER', serif;
            font-size: 32px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .timer-display {
            position: absolute;
            top: 20px;
            left: 30px;
            color: #ffffff;
            font-family: 'ALGER', serif;
            font-size: 32px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .bonus-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-family: 'ALGER', serif;
            font-size: 36px;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .bonus-text.show {
            opacity: 1;
            animation: bonusPulse 0.5s ease-in-out;
        }

        @keyframes bonusPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* ==================== FINISH SCREEN ==================== */
        .finish-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9995;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .finish-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .finish-image {
            max-width: 80%;
            max-height: 50%;
            object-fit: contain;
            pointer-events: none;
            margin-bottom: 20px;
        }

        .finish-score {
            color: #ffd700;
            font-family: 'ALGER', serif;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .wallpaper-container {
            display: flex;
            gap: 40px;
            margin-bottom: 25px;
        }

        .wallpaper-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .wallpaper-thumb {
            width: 240px;
            height: 180px;
            object-fit: cover;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* Locked wallpaper overlay */
        .wallpaper-lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 240px;
            height: 180px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .wallpaper-lock-overlay img {
            width: 60px;
            height: 60px;
            opacity: 0.8;
        }

        .wallpaper-lock-overlay.unlocked {
            opacity: 0;
        }

        .download-btn {
            width: 170px;
            height: 85px;
            background-image: url('images/download.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 340px 85px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            transition: transform 0.3s ease, filter 0.3s ease, opacity 0.3s ease;
        }

        .download-btn:hover {
            background-position: -170px 0;
            transform: scale(1.05);
        }

        .download-btn:focus {
            outline: none;
        }

        .download-btn.locked {
            filter: brightness(0.4);
            opacity: 0.5;
            pointer-events: none;
        }

        .download-btn.locked:hover {
            background-position: 0 0;
            transform: none;
        }

        .try-again-btn {
            width: 250px;
            height: 125px;
            background-image: url('images/try-again.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: 500px 125px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            transition: transform 0.3s ease;
            margin-top: 5px;
        }

        .try-again-btn:hover {
            background-position: -250px 0;
            transform: scale(1.05);
        }

        .try-again-btn:focus {
            outline: none;
        }

        /* ==================== MOUSE TRAIL SPARKLES ==================== */
        .mouse-trail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999997;
            overflow: hidden;
        }

        .mouse-sparkle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: mouseSparkleFade 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes mouseSparkleFade {
            0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
            30% { opacity: 1; transform: scale(1) rotate(180deg); }
            70% { opacity: 0.6; transform: scale(0.7) rotate(360deg); }
            100% { opacity: 0; transform: scale(0.1) rotate(540deg); }
        }

        /* ==================== CUSTOM CURSOR ==================== */
        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 99999999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease, filter 0.3s ease;
        }

        .custom-cursor::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sparkle.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: cursorSpin 1.5s linear infinite, cursorGlow 1.5s ease-in-out infinite;
        }

        @keyframes cursorSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes cursorGlow {
            0% { opacity: 0.7; filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); }
            50% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)) drop-shadow(0 0 4px #ff3366); }
            100% { opacity: 0.7; filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); }
        }

        .touch-sparkle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999998;
            overflow: hidden;
        }

        .touch-sparkle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            animation: touchSparkleFade 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes touchSparkleFade {
            0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
            30% { opacity: 1; transform: scale(1) rotate(180deg); }
            70% { opacity: 0.6; transform: scale(0.7) rotate(360deg); }
            100% { opacity: 0; transform: scale(0.1) rotate(540deg); }
        }

        @media (hover: hover) and (pointer: fine) {
            * { cursor: none !important; }
        }

        @media (max-width: 768px) {
            * { cursor: auto !important; }
            .custom-cursor { display: none !important; }
            .go-button { width: 150px; height: 75px; background-size: 300px 75px; }
            .go-button:hover { background-position: -150px 0; }
            .play-button { width: 75px; height: 37.5px; background-size: 150px 37.5px; }
            .play-button:hover { background-position: -75px 0; }
            .help-play-button { width: 75px; height: 37.5px; background-size: 150px 37.5px; }
            .help-play-button:hover { background-position: -75px 0; }
            .game-help-close-btn { width: 130px; height: 65px; background-size: 260px 65px; }
            .game-help-close-btn:hover { background-position: -130px 0; }
            .help-btn-game { width: 100px; height: 100px; background-size: 200px 100px; }
            .help-btn-game:hover { background-position: -100px 0; }
            .download-btn { width: 130px; height: 65px; background-size: 260px 65px; }
            .download-btn:hover { background-position: -130px 0; }
            .try-again-btn { width: 150px; height: 75px; background-size: 300px 75px; }
            .try-again-btn:hover { background-position: -150px 0; }
            .landing-image, .help-image { max-width: 90%; max-height: 60%; }
            .quote-bg { width: 100%; height: 150px; }
            .quote-text { font-size: 16px; }
            .loading-percentage { font-size: 24px; }
            .wallpaper-thumb { width: 120px; height: 160px; }
            .wallpaper-lock-overlay { width: 120px; height: 160px; }
            .wallpaper-lock-overlay img { width: 40px; height: 40px; }
            .wallpaper-container { gap: 20px; }
            .finish-score { font-size: 24px; }
            .finish-image { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div class="mouse-trail-container" id="mouseTrailContainer"></div>
    <div class="touch-sparkle-container" id="touchSparkleContainer"></div>
    <div class="global-sparkle-container" id="globalSparkleContainer"></div>

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-bg" id="loadingBg"></div>
        <div class="quote-container">
            <div class="quote-bg"></div>
            <div class="quote-text" id="quoteText">" loading... "</div>
            <div class="quote-author" id="quoteAuthor">— myrealap</div>
        </div>
    </div>

    <div class="loading-action-area" id="loadingActionArea">
        <div class="loading-percentage" id="loadingPercent">0%</div>

    <div class="game-help-overlay" id="gameHelpOverlay">

    <!-- FINISH SCREEN -->
    <div class="finish-screen" id="finishScreen">
        <img class="finish-image" src="images/end.png" alt="Game Over">
        <div class="finish-score" id="finishScore">You caught 0 stars!</div>
        <div class="wallpaper-container">
            <!-- Wallpaper 1 - unlocks at 3000 -->
            <div class="wallpaper-item" id="wallpaperItem1">
                <img class="wallpaper-thumb" src="images/wallpaper1-thumb.jpg" alt="Wallpaper 1">
                <div class="wallpaper-lock-overlay" id="lockOverlay1">
                    <img src="images/lock.png" alt="Locked">
                </div>
                <button class="download-btn locked" id="downloadBtn1" onclick="downloadWallpaper('images/wallpaper1.jpg')"></button>

            <!-- Wallpaper 2 - unlocks at 5000 -->
            <div class="wallpaper-item" id="wallpaperItem2">
                <img class="wallpaper-thumb" src="images/wallpaper2-thumb.jpg" alt="Wallpaper 2">
                <div class="wallpaper-lock-overlay" id="lockOverlay2">
                    <img src="images/lock.png" alt="Locked">
                </div>
                <button class="download-btn locked" id="downloadBtn2" onclick="downloadWallpaper('images/wallpaper2.jpg')"></button>
            </div>
        </div>
        <button class="try-again-btn" id="tryAgainBtn"></button>
    </div>

    <script>
        // ==================== QUOTES ====================
        const quotes = [
            { text: "Love & Imagination can change the world!", author: "Myrealap" },
            { text: "What makes you different, Makes you special", author: "Myrealap" },
            { text: "Your braver than you think", author: "Myrealap" },
            { text: "There is always hope", author: "Myrealap" },
            { text: "Trust your true self", author: "Myrealap" },
            { text: "The most beautiful thing you can be, is your self", author: "Myrealap" },
            { text: "Live your dream", author: "Myrealap" },
            { text: "Music is the poetry of the air", author: "Richter" },
            { text: "Where words fail, music speaks", author: "Hans Christian Andersen" },
            { text: "Art washes away from the soul the dust of everyday life", author: "Picasso" },
            { text: "The only truth is music", author: "Kerouac" },
            { text: "Life is like a beautiful melody, only the lyrics are messed up", author: "myrealap" }
        ];

        function showRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const quote = quotes[randomIndex];
            document.getElementById('quoteText').textContent = `" ${quote.text} "`;
            document.getElementById('quoteAuthor').textContent = `— ${quote.author}`;
        }
        showRandomQuote();

        // ==================== DEVICE DETECTION ====================
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // ==================== DUAL SPARKLE IMAGES ====================
        const sparkleImages = ['images/sparkle_a.png', 'images/sparkle_b.png'];
        function getRandomSparkleImage() {
            return sparkleImages[Math.floor(Math.random() * sparkleImages.length)];
        }

        // ==================== MOUSE SPARKLES ====================
        const MOUSE_SPARKLE_INTERVAL = 15;
        const MOUSE_SPARKLE_SIZE_MIN = 8;
        const MOUSE_SPARKLE_SIZE_MAX = 25;
        let lastMouseX = window.innerWidth / 2;
        let lastMouseY = window.innerHeight / 2;
        let continuousSparkleInterval = null;

        function addMouseSparkle(x, y) {
            const container = document.getElementById('mouseTrailContainer');
            const sparkle = document.createElement('div');
            sparkle.className = 'mouse-sparkle';
            sparkle.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            sparkle.style.left = (x + offsetX) + 'px';
            sparkle.style.top = (y + offsetY) + 'px';
            sparkle.style.animationDelay = Math.random() * 0.1 + 's';
            const size = Math.random() * (MOUSE_SPARKLE_SIZE_MAX - MOUSE_SPARKLE_SIZE_MIN) + MOUSE_SPARKLE_SIZE_MIN;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }

        function startMouseTrail() {
            if (isTouchDevice) return;
            let lastTime = 0;
            document.addEventListener('mousemove', (e) => {
                const now = Date.now();
                if (now - lastTime > MOUSE_SPARKLE_INTERVAL) {
                    lastTime = now;
                    addMouseSparkle(e.clientX, e.clientY);
                }
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            });
            continuousSparkleInterval = setInterval(() => {
                addMouseSparkle(lastMouseX, lastMouseY);
            }, MOUSE_SPARKLE_INTERVAL);
        }

        function addTouchSparkle(x, y) {
            const container = document.getElementById('touchSparkleContainer');
            const sparkle = document.createElement('div');
            sparkle.className = 'touch-sparkle';
            sparkle.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
            const offsetX = (Math.random() - 0.5) * 30;
            const offsetY = (Math.random() - 0.5) * 30;
            sparkle.style.left = (x + offsetX) + 'px';
            sparkle.style.top = (y + offsetY) + 'px';
            const size = Math.random() * 25 + 15;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 600);
        }

        function startTouchSparkles() {
            if (!isTouchDevice) return;
            document.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                addTouchSparkle(touch.clientX, touch.clientY);
            });
            document.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => addTouchSparkle(touch.clientX, touch.clientY), i * 50);
                }
            });
        }

        // ==================== GLOBAL SPARKLE BURST ====================
        function triggerGlobalSparkleBurst(callback) {
            const container = document.getElementById('globalSparkleContainer');
            const totalSparkles = 40;
            let sparklesCreated = 0;
            function createBurstSparkle() {
                const sparkle = document.createElement('div');
                sparkle.className = 'global-sparkle';
                sparkle.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
                sparkle.style.left = Math.random() * window.innerWidth + 'px';
                sparkle.style.top = Math.random() * window.innerHeight + 'px';
                sparkle.style.animationDelay = Math.random() * 0.3 + 's';
                const size = Math.random() * 40 + 20;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                container.appendChild(sparkle);
                sparklesCreated++;
                if (sparklesCreated >= totalSparkles) {
                    setTimeout(() => {
                        container.innerHTML = '';
                        if (callback) callback();
                    }, 1500);
                }
            }
            for (let i = 0; i < totalSparkles; i++) {
                setTimeout(createBurstSparkle, i * 25);
            }
        }

        // ==================== CUSTOM CURSOR ====================
        let customCursor = null;
        let cursorColor = '#ffffff';
        function setupCustomCursor() {
            if (isTouchDevice) return;
            customCursor = document.createElement('div');
            customCursor.className = 'custom-cursor';
            document.body.appendChild(customCursor);
            let mouseX = 0, mouseY = 0;
            let cursorX = 0, cursorY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            function animateCursor() {
                cursorX += (mouseX - cursorX) * 0.3;
                cursorY += (mouseY - cursorY) * 0.3;
                if (customCursor) {
                    customCursor.style.left = cursorX + 'px';
                    customCursor.style.top = cursorY + 'px';
                }
                requestAnimationFrame(animateCursor);
            }
            animateCursor();
            document.addEventListener('mouseleave', () => { if (customCursor) customCursor.style.opacity = '0'; });
            document.addEventListener('mouseenter', () => { if (customCursor) customCursor.style.opacity = '1'; });
        }
        function updateCursorColor(color) {
            cursorColor = color;
            if (customCursor) {
                customCursor.style.filter = `drop-shadow(0 0 8px ${color}) drop-shadow(0 0 4px ${color})`;
            }
        }
        if (isTouchDevice) { startTouchSparkles(); } else { startMouseTrail(); setupCustomCursor(); }

        // ==================== AUDIO SYSTEM ====================
        let audioContext = null;
        let landingMusic = null;
        let landingMusicBuffer = null;
        const clickSound = new Audio("sounds/click.mp3");
        clickSound.volume = 0.5;
        const hoverSound = new Audio("sounds/hover.mp3");
        hoverSound.volume = 0.3;
        const appearSound = new Audio("sounds/appear.mp3");
        appearSound.volume = 0.6;

        function playClickSound() { clickSound.currentTime = 0; clickSound.play().catch(() => {}); }
        function playHoverSound() { hoverSound.currentTime = 0; hoverSound.play().catch(() => {}); }
        function playAppearSound() { appearSound.currentTime = 0; appearSound.play().catch(() => {}); }

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => console.log('🎵 AudioContext resumed!'));
            }
        }

        function loadLandingMusic() {
            fetch('music/music_game.mp3')
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => { landingMusicBuffer = arrayBuffer; })
                .catch(error => console.log('Error loading music:', error));
        }

        function playLandingMusic() {
            if (!audioContext || !landingMusicBuffer) return;
            if (landingMusic) { try { landingMusic.stop(); } catch(e) {} }
            audioContext.decodeAudioData(landingMusicBuffer.slice(0))
                .then(buffer => {
                    landingMusic = audioContext.createBufferSource();
                    landingMusic.buffer = buffer;
                    landingMusic.loop = true;
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.7;
                    landingMusic.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    landingMusic.start(0);
                })
                .catch(err => console.log('Decode error:', err));
        }

        function stopLandingMusic() {
            if (landingMusic) { try { landingMusic.stop(); landingMusic = null; } catch(e) {} }
        }

        loadLandingMusic();

        function addHoverSoundToButtons() {
            const allButtons = document.querySelectorAll('button');
            allButtons.forEach(btn => {
                btn.addEventListener('mouseenter', () => playHoverSound());
            });
        }

        // ==================== FILE LOADING ====================
        const filesToLoad = [
            "images/quote-bg.png","images/sparkle.png","images/sparkle_a.png","images/sparkle_b.png",
            "images/Go.png","images/help.png","images/landing.png","images/play_landing.png",
            "images/play_help.png","images/loading-bg.png","images/try-again.png","images/download.png",
            "images/end.png","images/help_btn.png","images/lock.png",
        ];
        const allFiles = [...filesToLoad];
        let loadedCount = 0;
        const totalFiles = allFiles.length;
        const loadingPercentElement = document.getElementById('loadingPercent');

        function updateLoadingPercent() {
            const percent = Math.floor((loadedCount / totalFiles) * 100);
            loadingPercentElement.textContent = percent + '%';
        }

        function loadFile(src) {
            return new Promise((resolve) => {
                const isImage = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(src);
                if (isImage) {
                    const img = new Image();
                    img.onload = () => { loadedCount++; updateLoadingPercent(); resolve(); };
                    img.onerror = () => { loadedCount++; updateLoadingPercent(); resolve(); };
                    img.src = src;
                } else {
                    fetch(src).then(() => { loadedCount++; updateLoadingPercent(); resolve(); })
                        .catch(() => { loadedCount++; updateLoadingPercent(); resolve(); });
                }
            });
        }

        async function preloadAllAssets() {
            updateLoadingPercent();
            const loadPromises = allFiles.map(file => loadFile(file));
            await Promise.all(loadPromises);
            loadedCount = totalFiles;
            updateLoadingPercent();
            addHoverSoundToButtons();
            setTimeout(() => replacePercentWithGoButton(), 300);
        }

        function replacePercentWithGoButton() {
            const percentEl = document.getElementById('loadingPercent');
            const goBtn = document.getElementById('goButton');
            const loadingBg = document.getElementById('loadingBg');
            percentEl.classList.add('fade-out');
            setTimeout(() => {
                percentEl.style.display = 'none';
                loadingBg.classList.add('show');
                goBtn.classList.add('show');
            }, 600);
        }

        function handleGoButtonClick(e) {
            e.preventDefault();
            initAudioContext();
            playClickSound();
            const goButton = document.getElementById('goButton');
            goButton.classList.add('clicked');
            triggerGlobalSparkleBurst(() => {
                setTimeout(() => playLandingMusic(), 200);
                const loadingScreen = document.getElementById('loadingScreen');
                const loadingActionArea = document.getElementById('loadingActionArea');
                loadingScreen.classList.add('hide');
                loadingActionArea.style.display = 'none';
                setTimeout(() => { showLandingPage(); }, 800);
            });
        }

        // ==================== LANDING PAGE SPARKLES ====================
        const LANDING_SPARKLE_COUNT = 80;
        const LANDING_SPARKLE_INTERVAL = 60;
        const LANDING_SPARKLE_SIZE_MIN = 75;
        const LANDING_SPARKLE_SIZE_MAX = 100;
        let landingSparkleInterval = null;

        function createLandingBgSparkle() {
            const container = document.getElementById('landingSparkleBg');
            const sparkle = document.createElement('div');
            sparkle.className = 'landing-bg-sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 3.5 + 's';
            const size = Math.random() * (LANDING_SPARKLE_SIZE_MAX - LANDING_SPARKLE_SIZE_MIN) + LANDING_SPARKLE_SIZE_MIN;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3500);
        }
        function startLandingSparkles() {
            for (let i = 0; i < LANDING_SPARKLE_COUNT; i++) setTimeout(() => createLandingBgSparkle(), i * 50);
            landingSparkleInterval = setInterval(createLandingBgSparkle, LANDING_SPARKLE_INTERVAL);
        }
        function stopLandingSparkles() {
            if (landingSparkleInterval) clearInterval(landingSparkleInterval);
            document.getElementById('landingSparkleBg').innerHTML = '';
        }

        // ==================== HELP PAGE SPARKLES ====================
        const HELP_SPARKLE_COUNT = 80;
        const HELP_SPARKLE_INTERVAL = 60;
        const HELP_SPARKLE_SIZE_MIN = 75;
        const HELP_SPARKLE_SIZE_MAX = 100;
        let helpSparkleInterval = null;

        function createHelpBgSparkle() {
            const container = document.getElementById('helpSparkleBg');
            const sparkle = document.createElement('div');
            sparkle.className = 'help-bg-sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 3.5 + 's';
            const size = Math.random() * (HELP_SPARKLE_SIZE_MAX - HELP_SPARKLE_SIZE_MIN) + HELP_SPARKLE_SIZE_MIN;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3500);
        }
        function startHelpSparkles() {
            for (let i = 0; i < HELP_SPARKLE_COUNT; i++) setTimeout(() => createHelpBgSparkle(), i * 50);
            helpSparkleInterval = setInterval(createHelpBgSparkle, HELP_SPARKLE_INTERVAL);
        }
        function stopHelpSparkles() {
            if (helpSparkleInterval) clearInterval(helpSparkleInterval);
            document.getElementById('helpSparkleBg').innerHTML = '';
        }

        // ==================== GAME HELP OVERLAY SPARKLES ====================
        let gameHelpSparkleInterval = null;
        function createGameHelpBgSparkle() {
            const container = document.getElementById('gameHelpSparkleBg');
            const sparkle = document.createElement('div');
            sparkle.className = 'game-help-bg-sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 3.5 + 's';
            const size = Math.random() * (HELP_SPARKLE_SIZE_MAX - HELP_SPARKLE_SIZE_MIN) + HELP_SPARKLE_SIZE_MIN;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3500);
        }
        function startGameHelpSparkles() {
            for (let i = 0; i < 60; i++) setTimeout(() => createGameHelpBgSparkle(), i * 50);
            gameHelpSparkleInterval = setInterval(createGameHelpBgSparkle, HELP_SPARKLE_INTERVAL);
        }
        function stopGameHelpSparkles() {
            if (gameHelpSparkleInterval) clearInterval(gameHelpSparkleInterval);
            document.getElementById('gameHelpSparkleBg').innerHTML = '';
        }

        // ==================== SCREEN TRANSITIONS WITH APPEAR SOUND ====================
        function showLandingPage() {
            document.getElementById('landingPage').classList.add('show');
            startLandingSparkles();
            playAppearSound();
        }
        function hideLandingPage() {
            stopLandingSparkles();
            document.getElementById('landingPage').classList.remove('show');
            setTimeout(() => showHelpScreen(), 800);
        }
        function handlePlayButtonClick(e) {
            e.preventDefault();
            playClickSound();
            triggerGlobalSparkleBurst(() => { hideLandingPage(); });
        }
        function showHelpScreen() {
            document.getElementById('helpScreen').classList.add('show');
            startHelpSparkles();
            playAppearSound();
        }
        function hideHelpScreen() {
            stopHelpSparkles();
            document.getElementById('helpScreen').classList.remove('show');
            setTimeout(() => startGame(), 800);
        }
        function handleHelpPlayClick(e) {
            e.preventDefault();
            playClickSound();
            stopLandingMusic();
            triggerGlobalSparkleBurst(() => { hideHelpScreen(); });
        }

        // ==================== GAME BACKGROUND SPARKLES ====================
        let gameBgSparkleInterval = null;
        function createGameBgSparkle() {
            const container = document.getElementById('gameSparkleBg');
            const sparkle = document.createElement('div');
            sparkle.className = 'game-bg-sparkle';
            sparkle.style.backgroundImage = `url('${getRandomSparkleImage()}')`;
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 3 + 's';
            const size = Math.random() * 20 + 10;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3000);
        }
        function startGameBgSparkles() {
            for (let i = 0; i < 80; i++) setTimeout(() => createGameBgSparkle(), i * 40);
            gameBgSparkleInterval = setInterval(createGameBgSparkle, 60);
        }
        function stopGameBgSparkles() {
            if (gameBgSparkleInterval) clearInterval(gameBgSparkleInterval);
            document.getElementById('gameSparkleBg').innerHTML = '';
        }

        // ==================== GAME LOGIC ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let timeLeft = 60;
        let gameStars = [];
        let bonusSparkles = [];
        let floatingTexts = [];
        let gameLoopId = null;
        let gameTimerInterval = null;
        let bonusRoundActive = false;
        let spawnDirection = 'right';

        // ===== ADJUST STAR TRAIL SETTINGS HERE =====
        const TRAIL_SPARKLE_SIZE_MIN = 6;   // Min trail sparkle size (was 4)
        const TRAIL_SPARKLE_SIZE_MAX = 16;  // Max trail sparkle size (was 10)
        const TRAIL_MAX_COUNT = 20;         // Max trail sparkles per star (was 12)
        const TRAIL_SPAWN_RATE = 2;         // Spawn trail every X frames (was 3, lower=more)
        const TRAIL_LIFE_DECREASE = 0.03;   // How fast trail fades (was 0.04, lower=longer)
        // ===========================================

        const STAR_SET_SIZE = 3;
        const STAR_SET_ROWS = 5;
        const STAR_SPAWN_INTERVAL = 800;
        const STAR_SPEED_X = 2.5;
        const STAR_SPEED_Y_MIN = 1.5;
        const STAR_SPEED_Y_MAX = 3.0;

        const BONUS_SET_SIZE = 4;
        const BONUS_SET_ROWS = 5;
        const BONUS_SPAWN_INTERVAL = 500;
        const BONUS_SPEED = 3.5;

        let starSpawnTimeout = null;
        let bonusSpawnTimeout = null;

        const sparkleImageA = new Image();
        sparkleImageA.src = 'images/sparkle_a.png';
        const sparkleImageB = new Image();
        sparkleImageB.src = 'images/sparkle_b.png';

        function getRandomSparkleImageObj() {
            return Math.random() < 0.5 ? sparkleImageA : sparkleImageB;
        }

        const starTypes = [
            { size: 20, points: 10, color: '#4488ff' },
            { size: 35, points: 25, color: '#ff4444' },
            { size: 55, points: 50, color: '#ffd700' }
        ];

        const bonusTypes = [
            { size: 25, points: 20, color: '#ff69b4' },
            { size: 35, points: 50, color: '#ffd700' },
            { size: 50, points: 100, color: '#00ff88' }
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createStarSet(fromRight) {
            const stars = [];
            const startX = fromRight ? canvas.width + 50 : -50;
            for (let row = 0; row < STAR_SET_ROWS; row++) {
                const type = starTypes[Math.floor(Math.random() * starTypes.length)];
                const y = Math.random() * canvas.height * 0.8 + canvas.height * 0.1;
                stars.push({
                    x: startX + (Math.random() - 0.5) * 80,
                    y: y + (Math.random() - 0.5) * 60,
                    size: type.size, points: type.points, color: type.color,
                    speedX: fromRight ? -(STAR_SPEED_X + Math.random()) : (STAR_SPEED_X + Math.random()),
                    speedY: (Math.random() - 0.5) * (STAR_SPEED_Y_MAX - STAR_SPEED_Y_MIN) + STAR_SPEED_Y_MIN,
                    sparkles: [], sparkleTimer: 0, rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 2, isBonus: false, img: getRandomSparkleImageObj()
                });
            }
            return stars;
        }

        function createBonusSet(fromRight) {
            const stars = [];
            const startX = fromRight ? canvas.width + 50 : -50;
            for (let row = 0; row < BONUS_SET_ROWS; row++) {
                const type = bonusTypes[Math.floor(Math.random() * bonusTypes.length)];
                const y = Math.random() * canvas.height * 0.8 + canvas.height * 0.1;
                stars.push({
                    x: startX + (Math.random() - 0.5) * 100,
                    y: y + (Math.random() - 0.5) * 80,
                    size: type.size, points: type.points, color: type.color,
                    speedX: fromRight ? -(BONUS_SPEED + Math.random()) : (BONUS_SPEED + Math.random()),
                    speedY: (Math.random() - 0.5) * 2.5,
                    sparkles: [], sparkleTimer: 0, rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 3, isBonus: true, img: getRandomSparkleImageObj()
                });
            }
            return stars;
        }

        function spawnStarSet() {
            if (!gameRunning || gamePaused || bonusRoundActive) return;
            const fromRight = spawnDirection === 'right' || (spawnDirection === 'both' && Math.random() < 0.5);
            const newStars = createStarSet(fromRight);
            gameStars.push(...newStars);
            if (spawnDirection !== 'both') spawnDirection = spawnDirection === 'right' ? 'left' : 'right';
            starSpawnTimeout = setTimeout(spawnStarSet, STAR_SPAWN_INTERVAL);
        }

        function spawnBonusSet() {
            if (!gameRunning || gamePaused || !bonusRoundActive) return;
            const fromRight = Math.random() < 0.5;
            const newStars = createBonusSet(fromRight);
            bonusSparkles.push(...newStars);
            bonusSpawnTimeout = setTimeout(spawnBonusSet, BONUS_SPAWN_INTERVAL);
        }

        function createFloatingText(x, y, points) {
            return {
                x, y, text: '+' + points, life: 1,
                color: points >= 100 ? '#00ff88' : points >= 50 ? '#ffd700' : points >= 25 ? '#ff4444' : '#4488ff'
            };
        }

        function addStarTrailSparkle(star) {
            const sparkle = {
                x: star.x + (Math.random() - 0.5) * star.size * 0.8,
                y: star.y + (Math.random() - 0.5) * star.size * 0.8,
                size: Math.random() * (TRAIL_SPARKLE_SIZE_MAX - TRAIL_SPARKLE_SIZE_MIN) + TRAIL_SPARKLE_SIZE_MIN,
                life: 1, rotation: Math.random() * 360, img: star.img
            };
            star.sparkles.push(sparkle);
            if (star.sparkles.length > TRAIL_MAX_COUNT) star.sparkles.shift();
        }

        function drawSparkleStar(star) {
            star.sparkles.forEach((sparkle) => {
                ctx.save();
                ctx.globalAlpha = sparkle.life * 0.5;
                ctx.translate(sparkle.x, sparkle.y);
                ctx.rotate(sparkle.rotation * Math.PI / 180);
                ctx.drawImage(sparkle.img, -sparkle.size / 2, -sparkle.size / 2, sparkle.size, sparkle.size);
                ctx.restore();
            });
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.translate(star.x, star.y);
            ctx.drawImage(star.img, -star.size * 1.5, -star.size * 1.5, star.size * 3, star.size * 3);
            ctx.restore();
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.translate(star.x, star.y);
            ctx.rotate(star.rotation * Math.PI / 180);
            ctx.drawImage(star.img, -star.size / 2, -star.size / 2, star.size, star.size);
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = star.color;
            ctx.globalAlpha = 0.5;
            ctx.fillRect(-star.size / 2, -star.size / 2, star.size, star.size);
            ctx.restore();
        }

        function isClickOnStar(star, clickX, clickY) {
            const dx = clickX - star.x;
            const dy = clickY - star.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < star.size;
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            gameStars = gameStars.filter(star => {
                star.x += star.speedX;
                star.y += star.speedY;
                star.rotation += star.rotationSpeed;
                star.sparkleTimer++;
                if (star.sparkleTimer % TRAIL_SPAWN_RATE === 0) addStarTrailSparkle(star);
                star.sparkles.forEach(s => s.life -= TRAIL_LIFE_DECREASE);
                star.sparkles = star.sparkles.filter(s => s.life > 0);
                drawSparkleStar(star);
                if (star.y > canvas.height + star.size * 2 || star.x < -star.size * 2 || star.x > canvas.width + star.size * 2) return false;
                return true;
            });

            bonusSparkles = bonusSparkles.filter(bs => {
                bs.x += bs.speedX;
                bs.y += bs.speedY;
                bs.rotation += bs.rotationSpeed;
                bs.sparkleTimer++;
                if (bs.sparkleTimer % TRAIL_SPAWN_RATE === 0) addStarTrailSparkle(bs);
                bs.sparkles.forEach(s => s.life -= TRAIL_LIFE_DECREASE);
                bs.sparkles = bs.sparkles.filter(s => s.life > 0);
                drawSparkleStar(bs);
                if (bs.y > canvas.height + bs.size || bs.y < -bs.size || bs.x > canvas.width + bs.size || bs.x < -bs.size) return false;
                return true;
            });

            floatingTexts = floatingTexts.filter(ft => {
                ft.y -= 1.5;
                ft.life -= 0.02;
                ctx.save();
                ctx.globalAlpha = ft.life;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 20px ALGER, serif';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
                return ft.life > 0;
            });

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function handleStarClick(clickX, clickY) {
            let collected = false;
            for (let i = gameStars.length - 1; i >= 0; i--) {
                if (isClickOnStar(gameStars[i], clickX, clickY)) {
                    score += gameStars[i].points;
                    document.getElementById('scoreDisplay').textContent = 'Score: ' + score;
                    floatingTexts.push(createFloatingText(gameStars[i].x, gameStars[i].y, gameStars[i].points));
                    playCollectSound(gameStars[i].points);
                    gameStars.splice(i, 1);
                    collected = true;
                    break;
                }
            }
            if (!collected) {
                for (let i = bonusSparkles.length - 1; i >= 0; i--) {
                    if (isClickOnStar(bonusSparkles[i], clickX, clickY)) {
                        score += bonusSparkles[i].points;
                        document.getElementById('scoreDisplay').textContent = 'Score: ' + score;
                        floatingTexts.push(createFloatingText(bonusSparkles[i].x, bonusSparkles[i].y, bonusSparkles[i].points));
                        playCollectSound(bonusSparkles[i].points);
                        bonusSparkles.splice(i, 1);
                        break;
                    }
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            if (!gameRunning || gamePaused) return;
            handleStarClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning || gamePaused) return;
            e.preventDefault();
            const touch = e.touches[0];
            handleStarClick(touch.clientX, touch.clientY);
        });

        function playCollectSound(points) {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const freq = points >= 100 ? 1200 : points >= 50 ? 880 : points >= 25 ? 660 : 440;
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.value = 0.15;
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.25);
        }

        function startGame() {
            resizeCanvas();
            document.getElementById('gameScreen').classList.add('show');
            score = 0;
            timeLeft = 60;
            gameStars = [];
            bonusSparkles = [];
            floatingTexts = [];
            bonusRoundActive = false;
            spawnDirection = 'right';
            gamePaused = false;
            document.getElementById('scoreDisplay').textContent = 'Score: 0';
            document.getElementById('timerDisplay').textContent = 'Time: 60';
            startGameBgSparkles();
            gameRunning = true;
            spawnStarSet();
            gameLoopId = requestAnimationFrame(gameLoop);
            playAppearSound();
            
            gameTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').textContent = 'Time: ' + timeLeft;
                if (timeLeft === 30) {
                    bonusRoundActive = true;
                    spawnDirection = 'both';
                    spawnBonusSet();
                    const bonusText = document.getElementById('bonusText');
                    bonusText.classList.add('show');
                    setTimeout(() => bonusText.classList.remove('show'), 2000);
                }
                if (timeLeft === 10 && bonusRoundActive) {
                    bonusRoundActive = false;
                    spawnDirection = 'right';
                    if (bonusSpawnTimeout) clearTimeout(bonusSpawnTimeout);
                }
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            bonusRoundActive = false;
            clearInterval(gameTimerInterval);
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (starSpawnTimeout) clearTimeout(starSpawnTimeout);
            if (bonusSpawnTimeout) clearTimeout(bonusSpawnTimeout);
            stopGameBgSparkles();
            document.getElementById('gameScreen').classList.remove('show');
            
            // Update finish screen with unlocks
            updateWallpaperUnlocks();
            
            document.getElementById('finishScore').textContent = 'You caught ' + score + ' stars!';
            document.getElementById('finishScreen').classList.add('show');
            playAppearSound();
        }

        function updateWallpaperUnlocks() {
            // Wallpaper 1 unlocks at 3000
            if (score >= 3000) {
                document.getElementById('lockOverlay1').classList.add('unlocked');
                document.getElementById('downloadBtn1').classList.remove('locked');
            }
            // Wallpaper 2 unlocks at 5000
            if (score >= 5000) {
                document.getElementById('lockOverlay2').classList.add('unlocked');
                document.getElementById('downloadBtn2').classList.remove('locked');
            }
        }

        function downloadWallpaper(url) {
            // Check if unlocked
            if (url.includes('wallpaper1') && score < 3000) return;
            if (url.includes('wallpaper2') && score < 5000) return;
            
            const link = document.createElement('a');
            link.href = url;
            link.download = url.split('/').pop();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function handleTryAgain() {
            playClickSound();
            // Reset wallpaper locks
            document.getElementById('lockOverlay1').classList.remove('unlocked');
            document.getElementById('downloadBtn1').classList.add('locked');
            document.getElementById('lockOverlay2').classList.remove('unlocked');
            document.getElementById('downloadBtn2').classList.add('locked');
            
            document.getElementById('finishScreen').classList.remove('show');
            setTimeout(() => {
                showLandingPage();
                playLandingMusic();
                playAppearSound();
            }, 500);
        }

        // ==================== IN-GAME HELP ====================
        function showGameHelp() {
            if (!gameRunning) return;
            gamePaused = true;
            document.getElementById('gameHelpOverlay').classList.add('show');
            startGameHelpSparkles();
            playAppearSound();
        }

        function hideGameHelp() {
            gamePaused = false;
            stopGameHelpSparkles();
            document.getElementById('gameHelpOverlay').classList.remove('show');
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('goButton').addEventListener('click', handleGoButtonClick);
        document.getElementById('goButton').addEventListener('touchend', function(e) { e.preventDefault(); handleGoButtonClick(e); });
        document.getElementById('playButton').addEventListener('click', handlePlayButtonClick);
        document.getElementById('playButton').addEventListener('touchend', function(e) { e.preventDefault(); handlePlayButtonClick(e); });
        document.getElementById('helpPlayButton').addEventListener('click', handleHelpPlayClick);
        document.getElementById('helpPlayButton').addEventListener('touchend', function(e) { e.preventDefault(); handleHelpPlayClick(e); });
        document.getElementById('tryAgainBtn').addEventListener('click', handleTryAgain);
        document.getElementById('helpBtnGame').addEventListener('click', showGameHelp);
        document.getElementById('gameHelpCloseBtn').addEventListener('click', hideGameHelp);

        window.addEventListener('resize', () => { if (gameRunning) resizeCanvas(); });
        window.addEventListener('DOMContentLoaded', () => { preloadAllAssets(); });
    </script>
</body>
</html>
