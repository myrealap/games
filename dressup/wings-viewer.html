<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wings Viewer – No-Wing with Expand & Fade</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body {
      background: transparent;
      overflow: hidden;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    .wings-display {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      pointer-events: none;
      z-index: 0;
      align-items: center;
      justify-content: center;
    }
    .wings-display canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .magic-overlay {
      position: absolute;
      top: -7%;
      left: -11.04%;
      width: 122%;
      height: 122%;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .magic-overlay.active {
      opacity: 1;
    }
    .magic-overlay canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .falling-sparkle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .falling-sparkle {
      position: absolute;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0;
      pointer-events: none;
      animation: fallSparkle 1.8s ease-out forwards;
    }
    @keyframes fallSparkle {
      0% { opacity: 0; transform: translateY(0) scale(0.3) rotate(0deg); }
      20% { opacity: 1; transform: translateY(20px) scale(1) rotate(60deg); }
      60% { opacity: 0.9; transform: translateY(70px) scale(0.9) rotate(180deg); }
      100% { opacity: 0; transform: translateY(120px) scale(0.3) rotate(300deg); }
    }
  </style>
</head>
<body>

  <div class="wings-display" id="wingsDisplay">
    <canvas id="wingsCanvas"></canvas>
  </div>

  <div class="magic-overlay" id="magicOverlay">
    <canvas id="magicCanvas"></canvas>
  </div>

  <div class="falling-sparkle-container" id="fallingSparkleContainer"></div>

  <script>
    // ========== SPARKLE IMAGES ==========
    const sparkleImages = ['images/sparkle_a.png', 'images/sparkle_b.png'];
    const sparkleImageObjects = [];
    sparkleImages.forEach(src => {
      const img = new Image();
      img.src = src;
      sparkleImageObjects.push(img);
    });

    // ============================================================
    // ========== CONFIGURABLE SPARKLE SETTINGS ==========
    // ============================================================
    const SPARKLE_CONFIG = {
      sparklesPerBurst: 25,
      burstWaves: 5,
      sparkleDelay: 40,
      burstDelay: 400,
      fadeDuration: 2000,
      sparkleMinSize: 5,
      sparkleMaxSize: 50,
      fallDuration: 1500,
      fallDistance: 120,
      // Wing expansion speed (0.01 = slow, 0.05 = fast, 0.03 = default)
      expansionSpeed: 0.03,
    };
    // ============================================================

    // ========== WINGS STATE ==========
    let currentWingsImage = null;
    let wingsAnimationId = null;
    let wingFlapProgress = 0;
    let wingFlapDirection = 1;
    let wingsVisible = false;
    let isAnimating = false;
    let isStopping = false;
    let stopProgress = 0;
    let isTransitioning = false;
    let pendingWingUrl = null;
    let magicCallback = null;
    let isMagicActive = false;
    let wingFadeOpacity = 0;
    let wingFadeDirection = 1;
    let isRemovingWings = false;
    let wingExpandProgress = 0;
    let isExpandingWing = false;

    // ========== FALLING SPARKLES ==========
    function addFallingSparkle(x, y) {
      const container = document.getElementById('fallingSparkleContainer');
      const el = document.createElement('div');
      el.className = 'falling-sparkle';
      const sparkleImg = sparkleImages[Math.floor(Math.random() * sparkleImages.length)];
      el.style.backgroundImage = `url('${sparkleImg}')`;
      el.style.left = (x + (Math.random() - 0.5) * 12) + 'px';
      el.style.top = (y + (Math.random() - 0.5) * 12) + 'px';
      
      const duration = SPARKLE_CONFIG.fallDuration * (0.8 + Math.random() * 0.4);
      el.style.animationDuration = duration + 'ms';
      el.style.animationDelay = (Math.random() * 0.3) + 's';
      
      const size = Math.random() * (SPARKLE_CONFIG.sparkleMaxSize - SPARKLE_CONFIG.sparkleMinSize) + SPARKLE_CONFIG.sparkleMinSize;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      container.appendChild(el);
      
      const removeDelay = duration + 500;
      setTimeout(() => el.remove(), removeDelay);
    }

    function spawnFallingSparklesOnWing() {
      const canvas = document.getElementById('wingsCanvas');
      if (!canvas) return;
      
      const rect = canvas.getBoundingClientRect();
      
      if (!currentWingsImage || !wingsVisible) return;
      
      const imgWidth = currentWingsImage.width;
      const imgHeight = currentWingsImage.height;
      const scale = Math.min(
        canvas.width / imgWidth,
        canvas.height / imgHeight
      ) * 0.85;
      
      const wingX = (canvas.width - imgWidth * scale) / 2;
      const wingY = (canvas.height - imgHeight * scale) / 2;
      const wingWidth = imgWidth * scale;
      const wingHeight = imgHeight * scale;
      
      const canvasRect = canvas.getBoundingClientRect();
      const offsetX = canvasRect.left;
      const offsetY = canvasRect.top;
      
      const count = SPARKLE_CONFIG.sparklesPerBurst;
      for (let i = 0; i < count; i++) {
        const x = wingX + Math.random() * wingWidth;
        const y = wingY + Math.random() * wingHeight;
        
        const screenX = offsetX + x;
        const screenY = offsetY + y;
        
        setTimeout(() => {
          addFallingSparkle(screenX, screenY);
        }, i * SPARKLE_CONFIG.sparkleDelay + Math.random() * 50);
      }
    }

    // ========== WINGS UPDATE ==========
    function updateWings(imageUrl) {
      console.log('Wings update called:', imageUrl);
      
      const isNoWing = imageUrl && imageUrl.includes('no-wing');
      
      pendingWingUrl = imageUrl;
      
      if (isNoWing && wingsVisible && currentWingsImage) {
        console.log('Removing wings with EXPAND + sparkle effect (NO magic!)');
        isMagicActive = false;
        // Start the expansion animation first
        startWingExpansion();
        return;
      }
      
      if (isMagicActive) {
        console.log('Magic active - wing will be applied at 1500ms with fade-in');
        return;
      }
      
      if (wingsVisible && currentWingsImage && isAnimating) {
        smoothStopWings(() => {
          loadNewWing(imageUrl);
        });
      } else {
        loadNewWing(imageUrl);
      }
    }

    function loadNewWing(imageUrl) {
      const isNoWing = imageUrl && imageUrl.includes('no-wing');
      
      if (isNoWing) {
        if (wingsVisible) {
          startWingExpansion();
        }
        return;
      }
      
      currentWingsImage = new Image();
      currentWingsImage.onload = function() {
        console.log('Wings image loaded successfully');
        wingsVisible = true;
        isAnimating = false;
        isStopping = false;
        stopProgress = 0;
        wingFlapProgress = 0;
        wingFlapDirection = 1;
        wingFadeOpacity = 0;
        wingFadeDirection = 1;
        isRemovingWings = false;
        wingExpandProgress = 1;
        isExpandingWing = false;
        
        drawWingsWithFade();
        window.parent.postMessage({ action: 'wingsUpdated' }, '*');
      };
      currentWingsImage.onerror = function() {
        console.error('Failed to load wings image:', imageUrl);
      };
      currentWingsImage.src = imageUrl;
    }

    // ========== START WING EXPANSION (Unfold to fully open) ==========
    function startWingExpansion() {
      if (!wingsVisible || !currentWingsImage) {
        wingsVisible = false;
        currentWingsImage = null;
        return;
      }
      
      console.log('Starting wing expansion animation...');
      isExpandingWing = true;
      wingExpandProgress = 0.3; // Start from 30% open (like when changing wings)
      isRemovingWings = false;
      
      // Stop flapping animation
      isAnimating = false;
      if (wingsAnimationId) {
        cancelAnimationFrame(wingsAnimationId);
        wingsAnimationId = null;
      }
      
      const canvas = document.getElementById('wingsCanvas');
      const ctx = canvas.getContext('2d');
      
      function expandWing() {
        if (!currentWingsImage || !wingsVisible) {
          isExpandingWing = false;
          return;
        }
        
        // Increase expansion progress
        wingExpandProgress += SPARKLE_CONFIG.expansionSpeed;
        
        if (wingExpandProgress >= 1) {
          wingExpandProgress = 1;
          isExpandingWing = false;
          console.log('Wing fully expanded!');
          
          // Now start the removal with sparkles and fade
          setTimeout(() => {
            removeWingsWithSparkle();
          }, 300);
          
          return;
        }
        
        // Ease in-out for smooth expansion
        const easeProgress = wingExpandProgress < 0.5 
          ? 2 * wingExpandProgress * wingExpandProgress 
          : 1 - Math.pow(-2 * wingExpandProgress + 2, 2) / 2;
        
        const scaleX = 0.4 + (easeProgress * 0.6);
        
        // Draw wings with current expansion
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const imgWidth = currentWingsImage.width;
        const imgHeight = currentWingsImage.height;
        const scale = Math.min(
          canvas.width / imgWidth,
          canvas.height / imgHeight
        ) * 0.85;
        
        const x = (canvas.width - imgWidth * scale) / 2;
        const y = (canvas.height - imgHeight * scale) / 2;
        
        ctx.save();
        ctx.globalAlpha = wingFadeOpacity;
        ctx.translate(x + (imgWidth * scale) / 2, y + (imgHeight * scale) / 2);
        ctx.scale(scaleX, 1);
        ctx.drawImage(
          currentWingsImage,
          -(imgWidth * scale) / 2,
          -(imgHeight * scale) / 2,
          imgWidth * scale,
          imgHeight * scale
        );
        ctx.restore();
        
        // Spawn a few sparkles during expansion (subtle)
        if (Math.random() < 0.1) {
          spawnFallingSparklesOnWing();
        }
        
        requestAnimationFrame(expandWing);
      }
      
      expandWing();
    }

    // ========== REMOVE WINGS WITH SPARKLE EFFECT ==========
    function removeWingsWithSparkle() {
      if (!wingsVisible || !currentWingsImage) {
        wingsVisible = false;
        currentWingsImage = null;
        return;
      }
      
      console.log('Starting wing removal with sparkles...');
      isRemovingWings = true;
      
      // Stop flapping animation
      isAnimating = false;
      if (wingsAnimationId) {
        cancelAnimationFrame(wingsAnimationId);
        wingsAnimationId = null;
      }
      
      // Draw wings fully open before starting sparkles
      drawWingsFullyOpen();
      
      // Start sparkle bursts
      setTimeout(() => {
        for (let wave = 0; wave < SPARKLE_CONFIG.burstWaves; wave++) {
          setTimeout(() => {
            spawnFallingSparklesOnWing();
          }, wave * SPARKLE_CONFIG.burstDelay);
        }
        
        // Fade out the wing
        let fadeOutProgress = 0;
        const fadeStep = 0.016;
        const totalSteps = Math.ceil(1 / fadeStep);
        const stepDelay = SPARKLE_CONFIG.fadeDuration / totalSteps;
        
        function fadeOutWing() {
          fadeOutProgress += fadeStep;
          
          if (fadeOutProgress >= 1) {
            wingsVisible = false;
            currentWingsImage = null;
            wingFadeOpacity = 0;
            isRemovingWings = false;
            wingExpandProgress = 0;
            
            const canvas = document.getElementById('wingsCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Final sparkle bursts
            setTimeout(() => {
              spawnFallingSparklesOnWing();
            }, 300);
            
            setTimeout(() => {
              spawnFallingSparklesOnWing();
            }, 700);
            
            window.parent.postMessage({ action: 'wingsRemoved' }, '*');
            console.log('Wings removed completely');
            return;
          }
          
          const easeOut = 1 - Math.pow(1 - fadeOutProgress, 3);
          wingFadeOpacity = 1 - easeOut;
          
          drawWingsWithFade(wingFadeOpacity);
          
          if (Math.random() < 0.08) {
            spawnFallingSparklesOnWing();
          }
          
          setTimeout(fadeOutWing, stepDelay);
        }
        
        fadeOutWing();
        
      }, 300);
    }

    // ========== DRAW WINGS WITH FADE EFFECT ==========
    function drawWingsWithFade(opacity) {
      const canvas = document.getElementById('wingsCanvas');
      const ctx = canvas.getContext('2d');
      
      if (!currentWingsImage || !wingsVisible) return;
      
      const fadeValue = opacity !== undefined ? opacity : wingFadeOpacity;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const imgWidth = currentWingsImage.width;
      const imgHeight = currentWingsImage.height;
      const scale = Math.min(
        canvas.width / imgWidth,
        canvas.height / imgHeight
      ) * 0.85;
      
      const x = (canvas.width - imgWidth * scale) / 2;
      const y = (canvas.height - imgHeight * scale) / 2;
      
      ctx.save();
      ctx.globalAlpha = fadeValue;
      ctx.translate(x + (imgWidth * scale) / 2, y + (imgHeight * scale) / 2);
      ctx.scale(1.0, 1);
      ctx.drawImage(
        currentWingsImage,
        -(imgWidth * scale) / 2,
        -(imgHeight * scale) / 2,
        imgWidth * scale,
        imgHeight * scale
      );
      ctx.restore();
    }

    // ========== DRAW WINGS FULLY OPEN ==========
    function drawWingsFullyOpen() {
      const canvas = document.getElementById('wingsCanvas');
      const ctx = canvas.getContext('2d');
      
      if (!currentWingsImage || !wingsVisible) return;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const imgWidth = currentWingsImage.width;
      const imgHeight = currentWingsImage.height;
      const scale = Math.min(
        canvas.width / imgWidth,
        canvas.height / imgHeight
      ) * 0.85;
      
      const x = (canvas.width - imgWidth * scale) / 2;
      const y = (canvas.height - imgHeight * scale) / 2;
      
      ctx.save();
      ctx.globalAlpha = 1;
      ctx.translate(x + (imgWidth * scale) / 2, y + (imgHeight * scale) / 2);
      ctx.scale(1.0, 1);
      ctx.drawImage(
        currentWingsImage,
        -(imgWidth * scale) / 2,
        -(imgHeight * scale) / 2,
        imgWidth * scale,
        imgHeight * scale
      );
      ctx.restore();
    }

    // ========== ANIMATE FADE-IN ==========
    function animateFadeIn(callback) {
      console.log('Starting fade-in animation...');
      wingFadeOpacity = 0;
      wingFadeDirection = 1;
      
      function fadeStep() {
        wingFadeOpacity += 0.05;
        
        if (wingFadeOpacity >= 1) {
          wingFadeOpacity = 1;
          drawWingsWithFade(1);
          console.log('Fade-in complete');
          if (callback) callback();
          return;
        }
        
        drawWingsWithFade(wingFadeOpacity);
        requestAnimationFrame(fadeStep);
      }
      
      fadeStep();
    }

    // ========== SMOOTH STOP WINGS ==========
    function smoothStopWings(callback) {
      if (!isAnimating || !wingsVisible) {
        if (callback) callback();
        return;
      }
      
      console.log('Smoothly stopping wings...');
      isStopping = true;
      stopProgress = 0;
      isAnimating = false;
      
      const canvas = document.getElementById('wingsCanvas');
      const ctx = canvas.getContext('2d');
      
      function animateStop() {
        if (!currentWingsImage || !wingsVisible) {
          if (callback) callback();
          return;
        }
        
        stopProgress += 0.04;
        
        if (stopProgress >= 1) {
          stopProgress = 1;
          isStopping = false;
          drawWingsFullyOpen();
          console.log('Wings stopped - fully open');
          if (callback) callback();
          return;
        }
        
        const easeOut = 1 - Math.pow(1 - stopProgress, 3);
        const currentScaleX = 0.4 + (easeOut * 0.6);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const imgWidth = currentWingsImage.width;
        const imgHeight = currentWingsImage.height;
        const scale = Math.min(
          canvas.width / imgWidth,
          canvas.height / imgHeight
        ) * 0.85;
        
        const x = (canvas.width - imgWidth * scale) / 2;
        const y = (canvas.height - imgHeight * scale) / 2;
        
        ctx.save();
        ctx.globalAlpha = wingFadeOpacity;
        ctx.translate(x + (imgWidth * scale) / 2, y + (imgHeight * scale) / 2);
        ctx.scale(currentScaleX, 1);
        ctx.drawImage(
          currentWingsImage,
          -(imgWidth * scale) / 2,
          -(imgHeight * scale) / 2,
          imgWidth * scale,
          imgHeight * scale
        );
        ctx.restore();
        
        requestAnimationFrame(animateStop);
      }
      
      animateStop();
    }

    // ========== BUTTERFLY WINGS ANIMATION (Flapping) ==========
function startWingsFlapping() {
  console.log('Starting wings flapping animation from FULLY OPEN...');
  
  const canvas = document.getElementById('wingsCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('wingsDisplay');
  const rect = container.getBoundingClientRect();
  
  canvas.width = rect.width || window.innerWidth;
  canvas.height = rect.height || window.innerHeight;
  
  // START FROM FULLY OPEN (wingFlapProgress = 1)
  wingFlapProgress = 1;        // ← Start fully open
  wingFlapDirection = -1;      // ← Start going toward closed
  isAnimating = true;
  isStopping = false;
  stopProgress = 0;
  wingFadeOpacity = 1;
  
  if (wingsAnimationId) {
    cancelAnimationFrame(wingsAnimationId);
  }
  
  function animateFlapping() {
    if (!currentWingsImage || !wingsVisible || !isAnimating || isRemovingWings || isExpandingWing) {
      wingsAnimationId = requestAnimationFrame(animateFlapping);
      return;
    }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Continue flapping
    wingFlapProgress += 0.025 * wingFlapDirection;
    
    if (wingFlapProgress > 1) {
      wingFlapProgress = 1;
      wingFlapDirection = -1;
    } else if (wingFlapProgress < 0) {
      wingFlapProgress = 0;
      wingFlapDirection = 1;
    }
    
    const easeProgress = wingFlapProgress < 0.5 
      ? 2 * wingFlapProgress * wingFlapProgress 
      : 1 - Math.pow(-2 * wingFlapProgress + 2, 2) / 2;
    
    const scaleX = 0.4 + (easeProgress * 0.6);
    
    const imgWidth = currentWingsImage.width;
    const imgHeight = currentWingsImage.height;
    const scale = Math.min(
      canvas.width / imgWidth,
      canvas.height / imgHeight
    ) * 0.85;
    
    const x = (canvas.width - imgWidth * scale) / 2;
    const y = (canvas.height - imgHeight * scale) / 2;
    
    ctx.save();
    ctx.globalAlpha = wingFadeOpacity;
    ctx.translate(x + (imgWidth * scale) / 2, y + (imgHeight * scale) / 2);
    ctx.scale(scaleX, 1);
    ctx.drawImage(
      currentWingsImage,
      -(imgWidth * scale) / 2,
      -(imgHeight * scale) / 2,
      imgWidth * scale,
      imgHeight * scale
    );
    ctx.restore();
    
    wingsAnimationId = requestAnimationFrame(animateFlapping);
  }
  
  animateFlapping();
}

    // ========== WINGS MAGIC TRANSFORMATION ==========
    function playWingsMagic(callback) {
      console.log('Wings magic started');
      
      isMagicActive = true;
      magicCallback = callback;
      
      doMagicTransition(callback);
    }

    function doMagicTransition(callback) {
      const overlay = document.getElementById('magicOverlay');
      const canvas = document.getElementById('magicCanvas');
      const ctx = canvas.getContext('2d');
      
      const display = document.getElementById('wingsDisplay');
      const rect = display.getBoundingClientRect();
      
      canvas.width = rect.width || window.innerWidth;
      canvas.height = rect.height || window.innerHeight;
      
      overlay.classList.add('active');
      
      const transferImg = new Image();
      transferImg.src = 'images/fairy_transfer.png';
      transferImg.onload = function() {
        console.log('fairy_transfer.png loaded');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const scale = Math.min(
          canvas.width / transferImg.width,
          canvas.height / transferImg.height
        );
        const x = (canvas.width - transferImg.width * scale) / 2;
        const y = (canvas.height - transferImg.height * scale) / 2;
        
        let startTime = Date.now();
        const duration = 1500;
        const sparkles = [];
        
        const totalSparkles = 400;
        const sparkleMinSize = 20;
        const sparkleMaxSize = 45;
        const sparkleDistance = 0.5;
        const blinkSpeed = 200;
        const sparkleSpeed = 2;
        const fadeSpeed = 0.001;
        
        for (let i = 0; i < totalSparkles; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 0.3 + sparkleDistance;
          const edgeX = x + transferImg.width * scale * 0.5 + Math.cos(angle) * transferImg.width * scale * 0.55 * dist;
          const edgeY = y + transferImg.height * scale * 0.5 + Math.sin(angle) * transferImg.height * scale * 0.55 * dist;
          
          const img = sparkleImageObjects[Math.floor(Math.random() * sparkleImageObjects.length)];
          
          sparkles.push({
            x: edgeX,
            y: edgeY,
            size: Math.random() * (sparkleMaxSize - sparkleMinSize) + sparkleMinSize,
            speedX: (Math.random() - 0.5) * sparkleSpeed,
            speedY: (Math.random() - 0.5) * sparkleSpeed,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.1,
            life: Math.random() * 0.6 + 0.4,
            maxLife: Math.random() * 0.6 + 0.4,
            img: img,
            phase: Math.random() * Math.PI * 2
          });
        }
        
        let wingApplied = false;
        let opacity = 0;
        let fadeOutProgress = 0;
        let fadeInStarted = false;
        let wingFadeInProgress = 0;
        let wingImageLoaded = false;
        let newWingImg = null;
        
        function animateMagic() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          
          opacity = Math.min(progress * 2, 1);
          
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 30;
          ctx.drawImage(transferImg, x, y, transferImg.width * scale, transferImg.height * scale);
          ctx.restore();
          
          sparkles.forEach(sp => {
            sp.x += sp.speedX;
            sp.y += sp.speedY;
            sp.rotation += sp.rotationSpeed;
            sp.life -= fadeSpeed;
            
            if (sp.life <= 0) {
              sp.life = sp.maxLife;
              const angle = Math.random() * Math.PI * 2;
              const dist = Math.random() * 0.3 + sparkleDistance;
              sp.x = x + transferImg.width * scale * 0.5 + Math.cos(angle) * transferImg.width * scale * 0.55 * dist;
              sp.y = y + transferImg.height * scale * 0.5 + Math.sin(angle) * transferImg.height * scale * 0.55 * dist;
              sp.speedX = (Math.random() - 0.5) * sparkleSpeed;
              sp.speedY = (Math.random() - 0.5) * sparkleSpeed;
              sp.img = sparkleImageObjects[Math.floor(Math.random() * sparkleImageObjects.length)];
            }
            
            const blink = Math.abs(Math.sin(Date.now() / blinkSpeed + sp.phase));
            
            ctx.save();
            ctx.globalAlpha = sp.life * 0.8 * opacity * (0.5 + 0.5 * blink);
            ctx.translate(sp.x, sp.y);
            ctx.rotate(sp.rotation);
            
            const size = sp.size * (0.8 + 0.4 * Math.sin(Date.now() / 400 + sp.x));
            ctx.drawImage(sp.img, -size/2, -size/2, size, size);
            
            ctx.restore();
          });
          
          if (elapsed > 1500 && !wingApplied) {
            wingApplied = true;
            console.log('Applying wing at 1500ms with FADE-IN effect');
            
            const isNoWing = pendingWingUrl && pendingWingUrl.includes('no-wing');
            
            if (isNoWing) {
              console.log('No-wing detected in magic - removing wings');
              pendingWingUrl = null;
            } else if (pendingWingUrl) {
              console.log('Loading wing at 1500ms:', pendingWingUrl);
              newWingImg = new Image();
              newWingImg.onload = function() {
                console.log('Wing loaded - starting fade-in');
                currentWingsImage = newWingImg;
                wingsVisible = true;
                wingImageLoaded = true;
                wingFadeOpacity = 0;
                wingFadeInProgress = 0;
                fadeInStarted = true;
                pendingWingUrl = null;
              };
              newWingImg.onerror = function() {
                console.error('Failed to load wing at 1500ms');
              };
              newWingImg.src = pendingWingUrl;
            } else {
              console.log('No pending wing - keeping current');
              wingFadeOpacity = 1;
            }
          }
          
          if (fadeInStarted && wingImageLoaded) {
            wingFadeInProgress += 0.04;
            if (wingFadeInProgress >= 1) {
              wingFadeInProgress = 1;
              wingFadeOpacity = 1;
              fadeInStarted = false;
              console.log('Wing fade-in complete');
            } else {
              const easeOut = 1 - Math.pow(1 - wingFadeInProgress, 3);
              wingFadeOpacity = easeOut;
            }
            
            drawWingsWithFade(wingFadeOpacity);
          }
          
          if (elapsed > duration) {
            fadeOutProgress += 0.025;
            let fadeOutOpacity = Math.max(0, 1 - fadeOutProgress);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.globalAlpha = fadeOutOpacity * opacity;
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 30 * fadeOutOpacity;
            ctx.drawImage(transferImg, x, y, transferImg.width * scale, transferImg.height * scale);
            ctx.restore();
            
            sparkles.forEach(sp => {
              const blink = Math.abs(Math.sin(Date.now() / blinkSpeed + sp.phase));
              ctx.save();
              ctx.globalAlpha = sp.life * 0.8 * fadeOutOpacity * opacity * (0.5 + 0.5 * blink);
              ctx.translate(sp.x, sp.y);
              ctx.rotate(sp.rotation);
              const size = sp.size * (0.8 + 0.4 * Math.sin(Date.now() / 400 + sp.x));
              ctx.drawImage(sp.img, -size/2, -size/2, size, size);
              ctx.restore();
            });
            
            if (fadeOutOpacity <= 0) {
              overlay.classList.remove('active');
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              
              isMagicActive = false;
              
              console.log('Magic complete');
              
              if (pendingWingUrl && pendingWingUrl.includes('no-wing')) {
                console.log('No-wing selected - removing wings with sparkles');
                removeWingsWithSparkle();
                pendingWingUrl = null;
              } else if (currentWingsImage && wingsVisible) {
                console.log('Starting wings flapping animation!');
                wingFadeOpacity = 1;
                drawWingsFullyOpen();
                startWingsFlapping();
              }
              
              window.parent.postMessage({ action: 'wingsMagicComplete' }, '*');
              
              if (callback) callback();
              if (magicCallback) {
                magicCallback();
                magicCallback = null;
              }
              
              return;
            }
            
            requestAnimationFrame(animateMagic);
            return;
          }
          
          requestAnimationFrame(animateMagic);
        }
        
        animateMagic();
      };
      transferImg.onerror = function() {
        console.error('Failed to load fairy_transfer.png');
        overlay.classList.remove('active');
        isMagicActive = false;
        if (callback) callback();
        if (magicCallback) {
          magicCallback();
          magicCallback = null;
        }
      };
    }

    // ========== LISTEN FOR PARENT MESSAGES ==========
    window.addEventListener('message', function(event) {
      const data = event.data;
      console.log('Wings received message:', data);
      
      if (data.action === 'updateWings') {
        updateWings(data.imageUrl);
      }
      
      if (data.action === 'playWingsMagic') {
        if (pendingWingUrl && pendingWingUrl.includes('no-wing')) {
          console.log('No-wing - skipping magic, starting expansion');
          startWingExpansion();
          pendingWingUrl = null;
        } else {
          playWingsMagic(() => {});
        }
      }
      
      if (data.action === 'resize') {
        const canvas = document.getElementById('magicCanvas');
        const rect = document.getElementById('wingsDisplay').getBoundingClientRect();
        canvas.width = rect.width || window.innerWidth;
        canvas.height = rect.height || window.innerHeight;
        
        const wingsCanvas = document.getElementById('wingsCanvas');
        const wingsRect = document.getElementById('wingsDisplay').getBoundingClientRect();
        wingsCanvas.width = wingsRect.width || window.innerWidth;
        wingsCanvas.height = wingsRect.height || window.innerHeight;
        
        if (wingsVisible && currentWingsImage) {
          if (!isAnimating && !isRemovingWings && !isExpandingWing) {
            drawWingsWithFade(wingFadeOpacity);
          }
        }
      }
    });

    // ========== RESIZE HANDLER ==========
    window.addEventListener('resize', function() {
      const canvas = document.getElementById('magicCanvas');
      const rect = document.getElementById('wingsDisplay').getBoundingClientRect();
      canvas.width = rect.width || window.innerWidth;
      canvas.height = rect.height || window.innerHeight;
      
      const wingsCanvas = document.getElementById('wingsCanvas');
      const wingsRect = document.getElementById('wingsDisplay').getBoundingClientRect();
      wingsCanvas.width = wingsRect.width || window.innerWidth;
      wingsCanvas.height = wingsRect.height || window.innerHeight;
    });

    // ========== INIT ==========
    const wingsCanvas = document.getElementById('wingsCanvas');
    const wingsRect = document.getElementById('wingsDisplay').getBoundingClientRect();
    wingsCanvas.width = wingsRect.width || window.innerWidth;
    wingsCanvas.height = wingsRect.height || window.innerHeight;
    
    window.parent.postMessage({ action: 'wingsViewerReady' }, '*');
    console.log('Wings viewer ready!');
  </script>
</body>
