<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Model Viewer</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body {
      background: transparent;
      overflow: hidden;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    /* Model display - centered perfectly */
    .model-display {
      position: absolute;
      top: 19%;
      left: 30%;
      transform: translateX(-50%);
      width: 100%;
      height: 70%;
      display: flex;
      pointer-events: none;
      z-index: 1;
    }
    .model-display img {
      height: 90%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    /* Magic Overlay - perfectly aligned with model */
    .magic-overlay {
      position: absolute;
      bottom: 4.8%;
      right: 20%;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform: scale(1.14);
    }
    .magic-overlay.active {
      opacity: 1;
    }
    .magic-overlay canvas {
      height: 90%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    /* Responsive */
    @media (max-width: 480px) {
    }
    @media (max-width: 768px) {
    }
  </style>
</head>
<body>

  <!-- Model Display -->
  <div class="model-display" id="modelDisplay">
    <img id="modelImage" src="images/assets/full/mermaid/mermaid_purple_fish2.png" alt="Model">
  </div>

  <!-- Magic Overlay -->
  <div class="magic-overlay" id="magicOverlay">
    <canvas id="magicCanvas"></canvas>
  </div>

  <script>
    // ========== SPARKLE IMAGES ==========
    const sparkleImages = ['images/sparkle_a.png', 'images/sparkle_b.png'];
    const sparkleImageObjects = [];
    sparkleImages.forEach(src => {
      const img = new Image();
      img.src = src;
      sparkleImageObjects.push(img);
    });

    // ========== MODEL UPDATE FUNCTION ==========
    function updateModel(imageUrl) {
      const img = document.getElementById('modelImage');
      img.src = imageUrl;
    }

    // ========== MAGIC TRANSFORMATION ==========
    function playTransformationMagic(callback) {
      const overlay = document.getElementById('magicOverlay');
      const canvas = document.getElementById('magicCanvas');
      const ctx = canvas.getContext('2d');
      
      // Get the model display dimensions
      const modelDisplay = document.getElementById('modelDisplay');
      const rect = modelDisplay.getBoundingClientRect();
      
      canvas.width = rect.width || window.innerWidth;
      canvas.height = rect.height || window.innerHeight * 0.85;
      
      overlay.classList.add('active');
      
      const transferImg = new Image();
      transferImg.src = 'images/mermaid_transfer.png';
      transferImg.onload = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Calculate scale to fit within canvas
        const scale = Math.min(
          canvas.width / transferImg.width,
          canvas.height / transferImg.height
        );
        const x = (canvas.width - transferImg.width * scale) / 2;
        const y = (canvas.height - transferImg.height * scale) / 2;
        
        let startTime = Date.now();
        const duration = 1500;
        const sparkles = [];
        
        const totalSparkles = 400;
        const sparkleMinSize = 20;
        const sparkleMaxSize = 45;
        const sparkleDistance = 0.5;
        const blinkSpeed = 200;
        const sparkleSpeed = 2;
        const fadeSpeed = 0.001;
        
        // Create edge sparkles
        for (let i = 0; i < totalSparkles; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 0.3 + sparkleDistance;
          const edgeX = x + transferImg.width * scale * 0.5 + Math.cos(angle) * transferImg.width * scale * 0.55 * dist;
          const edgeY = y + transferImg.height * scale * 0.5 + Math.sin(angle) * transferImg.height * scale * 0.55 * dist;
          
          const img = sparkleImageObjects[Math.floor(Math.random() * sparkleImageObjects.length)];
          
          sparkles.push({
            x: edgeX,
            y: edgeY,
            size: Math.random() * (sparkleMaxSize - sparkleMinSize) + sparkleMinSize,
            speedX: (Math.random() - 0.5) * sparkleSpeed,
            speedY: (Math.random() - 0.5) * sparkleSpeed,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.1,
            life: Math.random() * 0.6 + 0.4,
            maxLife: Math.random() * 0.6 + 0.4,
            img: img,
            phase: Math.random() * Math.PI * 2
          });
        }
        
        let changeApplied = false;
        let opacity = 0;
        let fadeOutStart = false;
        let fadeOutProgress = 0;
  
  function animateMagic() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    
    // Fade in
    opacity = Math.min(progress * 2, 1);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw transfer image
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 30;
    ctx.drawImage(transferImg, x, y, transferImg.width * scale, transferImg.height * scale);
    ctx.restore();
          
          // Draw sparkles
          sparkles.forEach(sp => {
            sp.x += sp.speedX;
            sp.y += sp.speedY;
            sp.rotation += sp.rotationSpeed;
            sp.life -= fadeSpeed;
            
            if (sp.life <= 0) {
              sp.life = sp.maxLife;
              const angle = Math.random() * Math.PI * 2;
              const dist = Math.random() * 0.3 + sparkleDistance;
              sp.x = x + transferImg.width * scale * 0.5 + Math.cos(angle) * transferImg.width * scale * 0.55 * dist;
              sp.y = y + transferImg.height * scale * 0.5 + Math.sin(angle) * transferImg.height * scale * 0.55 * dist;
              sp.speedX = (Math.random() - 0.5) * sparkleSpeed;
              sp.speedY = (Math.random() - 0.5) * sparkleSpeed;
              sp.img = sparkleImageObjects[Math.floor(Math.random() * sparkleImageObjects.length)];
            }
            
            const blink = Math.abs(Math.sin(Date.now() / blinkSpeed + sp.phase));
            
            ctx.save();
            ctx.globalAlpha = sp.life * 0.8 * opacity * (0.5 + 0.5 * blink);
            ctx.translate(sp.x, sp.y);
            ctx.rotate(sp.rotation);
            
            const size = sp.size * (0.8 + 0.4 * Math.sin(Date.now() / 400 + sp.x));
            ctx.drawImage(sp.img, -size/2, -size/2, size, size);
            
            ctx.restore();
          });
          
          // Apply change at 1.5 seconds
    if (elapsed > 500 && !changeApplied) {
      changeApplied = true;
      if (callback) callback();
    }
    
    // FADE OUT after 3 seconds
    if (elapsed > duration) {
      fadeOutStart = true;
      fadeOutProgress += 0.02;
      const fadeOutOpacity = Math.max(0, 1 - fadeOutProgress);
      
      // Redraw with fading opacity
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.save();
      ctx.globalAlpha = fadeOutOpacity * opacity;
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 30 * fadeOutOpacity;
      ctx.drawImage(transferImg, x, y, transferImg.width * scale, transferImg.height * scale);
      ctx.restore();
      
      // Also fade sparkles
      sparkles.forEach(sp => {
        const blink = Math.abs(Math.sin(Date.now() / blinkSpeed + sp.phase));
        ctx.save();
        ctx.globalAlpha = sp.life * 0.8 * fadeOutOpacity * opacity * (0.5 + 0.5 * blink);
        ctx.translate(sp.x, sp.y);
        ctx.rotate(sp.rotation);
        const size = sp.size * (0.8 + 0.4 * Math.sin(Date.now() / 400 + sp.x));
        ctx.drawImage(sp.img, -size/2, -size/2, size, size);
        ctx.restore();
      });
      
      if (fadeOutOpacity <= 0) {
        overlay.classList.remove('active');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }
      
      requestAnimationFrame(animateMagic);
      return;
    }
    
    requestAnimationFrame(animateMagic);
  }
  
  animateMagic();
      };
    }

    // ========== LISTEN FOR MESSAGES FROM PARENT ==========
    window.addEventListener('message', function(event) {
      const data = event.data;
      
      if (data.action === 'updateModel') {
        updateModel(data.imageUrl);
      }
      
      if (data.action === 'playMagic') {
        playTransformationMagic(() => {
          // Notify parent that magic is complete
          window.parent.postMessage({ action: 'magicComplete' }, '*');
        });
      }
      
      if (data.action === 'resize') {
        // Handle resize
        const canvas = document.getElementById('magicCanvas');
        const rect = document.getElementById('modelDisplay').getBoundingClientRect();
        canvas.width = rect.width || window.innerWidth;
        canvas.height = rect.height || window.innerHeight * 0.85;
      }
    });

    // ========== HANDLE RESIZE ==========
    window.addEventListener('resize', function() {
      const canvas = document.getElementById('magicCanvas');
      const rect = document.getElementById('modelDisplay').getBoundingClientRect();
      canvas.width = rect.width || window.innerWidth;
      canvas.height = rect.height || window.innerHeight * 0.85;
    });

    // ========== INIT ==========
    // Let parent know we're ready
    window.parent.postMessage({ action: 'modelViewerReady' }, '*');
  </script>
</body>
</html>
