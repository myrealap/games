<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shirt Viewer – Transformation + Sparkles</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body {
      background: transparent;
      overflow: hidden;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    .shirt-display {
      position: absolute;
      top: 19%;
      left: 30%;
      transform: translateX(-50%);
      width: 100%;
      height: 70%;
      display: flex;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
    }
    .shirt-display img {
      height: 90%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .magic-overlay {
      position: absolute;
      bottom: 4.8%;
      right: 20%;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform: scale(1.14);
    }
    .magic-overlay.active {
      opacity: 1;
    }
    .magic-overlay canvas {
      height: 90%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .shirt-sparkle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .shirt-sparkle {
      position: absolute;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0;
      pointer-events: none;
      animation: shirtSparkleFall 1.5s ease-out forwards;
    }
    @keyframes shirtSparkleFall {
      0% { opacity: 0; transform: translateY(0) scale(0.3) rotate(0deg); }
      20% { opacity: 1; transform: translateY(15px) scale(1.1) rotate(60deg); }
      60% { opacity: 0.9; transform: translateY(50px) scale(0.9) rotate(180deg); }
      100% { opacity: 0; transform: translateY(90px) scale(0.3) rotate(300deg); }
    }

    @media (max-width: 480px) {
      .shirt-display {
        bottom: 4% !important;
        left: -20% !important;
        width: 150% !important;
        height: 100% !important;
        transform: scale(0.8) !important;
        top: unset !important;
      }
    }
  </style>
</head>
<body>

  <!-- Shirt Display -->
  <div class="shirt-display" id="shirtDisplay">
    <img id="shirtImage" src="" alt="Shirt">
  </div>

  <!-- Magic Overlay -->
  <div class="magic-overlay" id="magicOverlay">
    <canvas id="magicCanvas"></canvas>
  </div>

  <div class="shirt-sparkle-container" id="shirtSparkleContainer"></div>

  <script>
    // ========== SPARKLE IMAGES ==========
    const sparkleImages = ['images/sparkle_a.png', 'images/sparkle_b.png'];
    const sparkleImageObjects = [];
    sparkleImages.forEach(src => {
      const img = new Image();
      img.src = src;
      sparkleImageObjects.push(img);
    });

    // ============================================================
    // ========== CONFIGURABLE SPARKLE SETTINGS ==========
    // ============================================================
    const SPARKLE_CONFIG = {
      sparklesPerBurst: 25,
      burstWaves: 5,
      sparkleDelay: 40,
      burstDelay: 400,
      sparkleMinSize: 5,
      sparkleMaxSize: 40,
      fallDuration: 1500,
      spreadRadius: 0.3,
      fadeDuration: 2000,
    };
    // ============================================================

    // ========== STATE ==========
    let currentShirtUrl = null;
    let shirtLoaded = false;
    let pendingShirtUrl = null;
    let isMagicActive = false;
    let isFirstShirt = true;

    // ========== SHIRT SPARKLES ==========
    function addShirtSparkle(x, y) {
      const container = document.getElementById('shirtSparkleContainer');
      const el = document.createElement('div');
      el.className = 'shirt-sparkle';
      const sparkleImg = sparkleImages[Math.floor(Math.random() * sparkleImages.length)];
      el.style.backgroundImage = `url('${sparkleImg}')`;
      
      const spread = SPARKLE_CONFIG.spreadRadius * 30;
      el.style.left = (x + (Math.random() - 0.5) * spread) + 'px';
      el.style.top = (y + (Math.random() - 0.5) * spread) + 'px';
      
      el.style.animationDelay = Math.random() * 0.2 + 's';
      const size = Math.random() * (SPARKLE_CONFIG.sparkleMaxSize - SPARKLE_CONFIG.sparkleMinSize) + SPARKLE_CONFIG.sparkleMinSize;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      
      const duration = SPARKLE_CONFIG.fallDuration * (0.8 + Math.random() * 0.4);
      el.style.animationDuration = duration + 'ms';
      
      container.appendChild(el);
      setTimeout(() => el.remove(), duration + 500);
    }

    function spawnShirtSparkles() {
      const display = document.getElementById('shirtDisplay');
      const rect = display.getBoundingClientRect();
      
      const count = SPARKLE_CONFIG.sparklesPerBurst;
      for (let i = 0; i < count; i++) {
        const x = rect.left + (Math.random() * 0.3 + 0.35) * rect.width;
        const y = rect.top + (Math.random() * 0.4 + 0.15) * rect.height;
        setTimeout(() => {
          addShirtSparkle(x, y);
        }, i * SPARKLE_CONFIG.sparkleDelay + Math.random() * 50);
      }
    }

    // ========== UPDATE SHIRT ==========
    function updateShirt(imageUrl) {
      console.log('Shirt update called:', imageUrl);
      
      // Check if this is "no-shirt"
      const isNoShirt = imageUrl && imageUrl.includes('no-shirt');
      
      // Store pending URL
      pendingShirtUrl = imageUrl;
      
      // If no-shirt, remove with sparkles (NO magic!)
      if (isNoShirt) {
        console.log('No shirt - removing with sparkles (NO MAGIC!)');
        isMagicActive = false;
        removeShirtWithSparkles();
        return;
      }
      
      // If same shirt, do nothing
      if (imageUrl === currentShirtUrl && shirtLoaded) return;
      
      // Use magic transformation for ALL shirt changes (including first)
      playShirtMagic(() => {
        // After magic completes, apply the new shirt
        applyNewShirt(imageUrl);
      });
    }

    function applyNewShirt(imageUrl) {
      currentShirtUrl = imageUrl;
      shirtLoaded = false;
      
      const shirtImg = document.getElementById('shirtImage');
      shirtImg.src = imageUrl;
      shirtImg.onload = function() {
        shirtLoaded = true;
        fadeInShirtWithSparkles();
      };
      shirtImg.onerror = function() {
        console.error('Failed to load shirt:', imageUrl);
      };
    }

    // ========== REMOVE SHIRT WITH SPARKLES (NO MAGIC) ==========
    function removeShirtWithSparkles() {
      const display = document.getElementById('shirtDisplay');
      
      // If no shirt loaded, just return
      if (!shirtLoaded || !currentShirtUrl) {
        currentShirtUrl = null;
        shirtLoaded = false;
        display.style.opacity = '0';
        pendingShirtUrl = null;
        return;
      }
      
      console.log('Removing shirt with sparkles only (NO MAGIC!)...');
      
      // Spawn sparkles in bursts
      for (let wave = 0; wave < SPARKLE_CONFIG.burstWaves; wave++) {
        setTimeout(() => {
          spawnShirtSparkles();
        }, wave * SPARKLE_CONFIG.burstDelay);
      }
      
      // Fade out
      display.style.opacity = '0';
      display.style.transition = `opacity ${SPARKLE_CONFIG.fadeDuration}ms ease`;
      
      setTimeout(() => {
        currentShirtUrl = null;
        shirtLoaded = false;
        document.getElementById('shirtImage').src = '';
        pendingShirtUrl = null;
        display.style.transition = 'opacity 0.3s ease';
        
        // Final sparkle bursts after removal
        setTimeout(() => spawnShirtSparkles(), 200);
        setTimeout(() => spawnShirtSparkles(), 500);
      }, SPARKLE_CONFIG.fadeDuration + 100);
    }

    // ========== FADE IN SHIRT WITH SPARKLES ==========
    function fadeInShirtWithSparkles() {
      const display = document.getElementById('shirtDisplay');
      
      display.style.opacity = '0';
      display.style.transition = 'opacity 0.3s ease';
      
      void display.offsetWidth;
      
      display.style.opacity = '1';
      
      // Spawn sparkles in bursts
      for (let wave = 0; wave < SPARKLE_CONFIG.burstWaves; wave++) {
        setTimeout(() => {
          spawnShirtSparkles();
        }, 200 + wave * SPARKLE_CONFIG.burstDelay);
      }
    }

    // ========== SHIRT MAGIC TRANSFORMATION ==========
    function playShirtMagic(callback) {
      console.log('Shirt magic started');
      
      isMagicActive = true;
      
      const overlay = document.getElementById('magicOverlay');
      const canvas = document.getElementById('magicCanvas');
      const ctx = canvas.getContext('2d');
      
      const display = document.getElementById('shirtDisplay');
      const rect = display.getBoundingClientRect();
      
      canvas.width = rect.width || window.innerWidth;
      canvas.height = rect.height || window.innerHeight * 0.85;
      
      overlay.classList.add('active');
      
      const transferImg = new Image();
      transferImg.src = 'images/shirts_transfer.png';
      transferImg.onload = function() {
        console.log('shirts_transfer.png loaded');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const scale = Math.min(
          canvas.width / transferImg.width,
          canvas.height / transferImg.height
        );
        const x = (canvas.width - transferImg.width * scale) / 2;
        const y = (canvas.height - transferImg.height * scale) / 2;
        
        let startTime = Date.now();
        const duration = 1500;
        const sparkles = [];
        
        const totalSparkles = 400;
        const sparkleMinSize = 20;
        const sparkleMaxSize = 45;
        const sparkleDistance = 0.5;
        const blinkSpeed = 200;
        const sparkleSpeed = 2;
        const fadeSpeed = 0.001;
        
        for (let i = 0; i < totalSparkles; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 0.3 + sparkleDistance;
          const edgeX = x + transferImg.width * scale * 0.5 + Math.cos(angle) * transferImg.width * scale * 0.55 * dist;
          const edgeY = y + transferImg.height * scale * 0.5 + Math.sin(angle) * transferImg.height * scale * 0.55 * dist;
          
          const img = sparkleImageObjects[Math.floor(Math.random() * sparkleImageObjects.length)];
          
          sparkles.push({
            x: edgeX,
            y: edgeY,
            size: Math.random() * (sparkleMaxSize - sparkleMinSize) + sparkleMinSize,
            speedX: (Math.random() - 0.5) * sparkleSpeed,
            speedY: (Math.random() - 0.5) * sparkleSpeed,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.1,
            life: Math.random() * 0.6 + 0.4,
            maxLife: Math.random() * 0.6 + 0.4,
            img: img,
            phase: Math.random() * Math.PI * 2
          });
        }
        
        let changeApplied = false;
        let opacity = 0;
        let fadeOutProgress = 0;
        
        function animateMagic() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          
          opacity = Math.min(progress * 2, 1);
          
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          // Draw transfer image
          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 30;
          ctx.drawImage(transferImg, x, y, transferImg.width * scale, transferImg.height * scale);
          ctx.restore();
          
          // Draw sparkles
          sparkles.forEach(sp => {
            sp.x += sp.speedX;
            sp.y += sp.speedY;
            sp.rotation += sp.rotationSpeed;
            sp.life -= fadeSpeed;
            
            if (sp.life <= 0) {
              sp.life = sp.maxLife;
              const angle = Math.random() * Math.PI * 2;
              const dist = Math.random() * 0.3 + sparkleDistance;
              sp.x = x + transferImg.width * scale * 0.5 + Math.cos(angle) * transferImg.width * scale * 0.55 * dist;
              sp.y = y + transferImg.height * scale * 0.5 + Math.sin(angle) * transferImg.height * scale * 0.55 * dist;
              sp.speedX = (Math.random() - 0.5) * sparkleSpeed;
              sp.speedY = (Math.random() - 0.5) * sparkleSpeed;
              sp.img = sparkleImageObjects[Math.floor(Math.random() * sparkleImageObjects.length)];
            }
            
            const blink = Math.abs(Math.sin(Date.now() / blinkSpeed + sp.phase));
            
            ctx.save();
            ctx.globalAlpha = sp.life * 0.8 * opacity * (0.5 + 0.5 * blink);
            ctx.translate(sp.x, sp.y);
            ctx.rotate(sp.rotation);
            
            const size = sp.size * (0.8 + 0.4 * Math.sin(Date.now() / 400 + sp.x));
            ctx.drawImage(sp.img, -size/2, -size/2, size, size);
            
            ctx.restore();
          });
          
          // Apply shirt change at 1500ms
          if (elapsed > 1500 && !changeApplied) {
            changeApplied = true;
            if (callback) callback();
          }
          
          // Fade out after duration
          if (elapsed > duration) {
            fadeOutProgress += 0.025;
            let fadeOutOpacity = Math.max(0, 1 - fadeOutProgress);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.globalAlpha = fadeOutOpacity * opacity;
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 30 * fadeOutOpacity;
            ctx.drawImage(transferImg, x, y, transferImg.width * scale, transferImg.height * scale);
            ctx.restore();
            
            sparkles.forEach(sp => {
              const blink = Math.abs(Math.sin(Date.now() / blinkSpeed + sp.phase));
              ctx.save();
              ctx.globalAlpha = sp.life * 0.8 * fadeOutOpacity * opacity * (0.5 + 0.5 * blink);
              ctx.translate(sp.x, sp.y);
              ctx.rotate(sp.rotation);
              const size = sp.size * (0.8 + 0.4 * Math.sin(Date.now() / 400 + sp.x));
              ctx.drawImage(sp.img, -size/2, -size/2, size, size);
              ctx.restore();
            });
            
            if (fadeOutOpacity <= 0) {
              overlay.classList.remove('active');
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              isMagicActive = false;
              return;
            }
            
            requestAnimationFrame(animateMagic);
            return;
          }
          
          requestAnimationFrame(animateMagic);
        }
        
        animateMagic();
      };
      
      transferImg.onerror = function() {
        console.error('Failed to load shirts_transfer.png');
        overlay.classList.remove('active');
        isMagicActive = false;
        if (callback) callback();
      };
    }

    // ========== LISTEN FOR PARENT MESSAGES ==========
    window.addEventListener('message', function(event) {
      const data = event.data;
      console.log('Shirt viewer received:', data);
      
      if (data.action === 'updateShirt') {
        updateShirt(data.imageUrl);
      }
      
      if (data.action === 'resize') {
        const canvas = document.getElementById('magicCanvas');
        const rect = document.getElementById('shirtDisplay').getBoundingClientRect();
        canvas.width = rect.width || window.innerWidth;
        canvas.height = rect.height || window.innerHeight * 0.85;
      }
    });

    // ========== INIT ==========
    window.parent.postMessage({ action: 'shirtViewerReady' }, '*');
    console.log('Shirt viewer ready with magic!');
  </script>
</body>
</html>
